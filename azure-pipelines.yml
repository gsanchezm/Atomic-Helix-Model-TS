      # -----------------------------------------------------------------
      # Job: Security — ZAP (profile `zap`, independent, not in the
      # writes chain). No `@mobsf`/`@zap` tag exists — `@security` is the
      # hard-gating active-scan suite; `@security-infra` is deliberately
      # run from BOTH this job and security_mobsf, split by which plugin
      # is live in each (security-infra.route.ts's own per-plugin checks
      # make the unused half a non-fatal warning, not a failure). The
      # second run-suite.sh call is guarded with `succeededOrFailed()`
      # (Azure equivalent of GHA's `if: success() || failure()`) so it
      # still runs even if the hard-gating @security step failed.
      # -----------------------------------------------------------------
      - job: security_zap
        displayName: 'Security — ZAP'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'security'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
