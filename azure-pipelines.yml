            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/ios
              artifact: ahm-artifacts-e2e-ios-writes
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Mobilewright (profile `mobilewright`) — GHA's `e2e-mobilewright`
      # is ONE job with `strategy: matrix: {platform:[android,ios]}` and a
      # computed `runs-on` per leg. Azure's `strategy: matrix:` cannot vary
      # a job's `pool:`/`container:` per leg (pool selection happens before
      # any matrix-leg variable exists), so this is split into 4 jobs here
      # — `_android_reads/_writes` (self-hosted KVM pool) and
      # `_ios_reads/_writes` (macOS-latest) — see the file-header note.
      # `mobilewrightNeedsAppiumServer: false` — no Appium daemon is
      # started for this profile (mobilewright drives devices via
      # `mobilecli`, not Appium/WebDriverIO — ci/pipeline.config.json,
      # ci/steps/start-stack.sh's `mobilewright)` arm). The two writes
      # legs are chained into the global writes queue as two consecutive
      # links (android leg, then ios leg) rather than GHA's one combined
      # link, preserving mutual exclusion against the shared fixture.
      # KNOWN GAP (README.md / ci/pipeline.config.json): this job is wired
      # but will fail at DeviceLoader.forWorker() until "mobilewright" is
      # added to docker_android.json's/ci_ios_headless.json's
      # compatibleDrivers arrays — out of this task's file scope.
      # -----------------------------------------------------------------
      - job: e2e_mobilewright_android_reads
        displayName: 'E2E — Mobilewright android reads'
        dependsOn: resolve_omnipizza_release
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'mobilewright')), in(dependencies.resolve_omnipizza_release.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        pool:
          name: 'self-hosted-android-kvm'  # placeholder — nested-virt self-hosted pool, see caveat above
        variables:
          OMNIPIZZA_RELEASE_TAG: $[ dependencies.resolve_omnipizza_release.outputs['fetch.tag'] ]
          OMNIPIZZA_RELEASE_BASE_URL: $[ dependencies.resolve_omnipizza_release.outputs['fetch.base_url'] ]
        steps:
          - checkout: self
          - script: |
              echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
                | sudo tee /etc/udev/rules.d/99-kvm4all.rules
              sudo udevadm control --reload-rules
              sudo udevadm trigger --name-match=kvm
            displayName: 'Enable KVM'
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: |
              sudo apt-get update
              sudo apt-get install -y android-sdk-platform-tools
              adb version
            displayName: 'Install Android platform tools'
          - script: |
              mkdir -p assets/apps/android
              echo "Downloading OmniPizza Android APK from release $OMNIPIZZA_RELEASE_TAG"
              curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
                -o assets/apps/android/app-release.apk
              ls -lh assets/apps/android/app-release.apk
            displayName: 'Download Android app artifact'
          - script: |
              docker run -d \
                --name android-emulator \
                --privileged \
                --device /dev/kvm \
                -p 5554:5554 \
                -p 5555:5555 \
                -e API_LEVEL=${{ parameters.androidApiLevel }} \
                -e IMG_TYPE=google_apis \
                -e ARCHITECTURE=x86_64 \
                -e DEVICE_ID=pixel \
                -e MEMORY=4096 \
                -e CORES=2 \
                -e DISABLE_ANIMATION=true \
                -e DISABLE_HIDDEN_POLICY=true \
                -e SKIP_AUTH=1 \
                halimqarroum/docker-android:api-${{ parameters.androidApiLevel }}
            displayName: 'Start Android emulator (docker-android)'
          - script: |
              echo "Waiting for ADB device to appear..."
              adb connect localhost:5555
              for i in $(seq 1 40); do
                if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
                  echo "Emulator ready after $((i * 15))s"
                  break
                fi
                echo "  Attempt $i/40 — waiting 15s..."
                sleep 15
              done
              adb devices
            displayName: 'Wait for emulator to be ready'
          # No Appium server started — mobilewrightNeedsAppiumServer: false.
          - script: bash ci/steps/start-stack.sh mobilewright
            displayName: 'Start proxy + Mobilewright plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: android
              DRIVER: mobilewright
              CAP_PROFILE: docker_android
              ANDROID_APP_PATH: assets/apps/android/app-release.apk
              ANDROID_UDID: localhost:5555
              PLUGIN_MOBILEWRIGHT: 'true'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@android and not @writes-shared-state" mobilewright android-reads
            displayName: 'Run E2E tests'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: android
              DRIVER: mobilewright
              CAP_PROFILE: docker_android
              ANDROID_APP_PATH: assets/apps/android/app-release.apk
              ANDROID_UDID: localhost:5555
          - script: |
              docker ps -a --filter name=android-emulator
              if docker ps -a --format '{{.Names}}' | grep -qx android-emulator; then
                docker logs --tail 200 android-emulator
              else
                echo "android-emulator container was not created."
              fi
            displayName: 'Show Android emulator logs'
            condition: failed()
          - script: bash ci/steps/collect-artifacts.sh mobilewright
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/mobilewright
              artifact: ahm-artifacts-e2e-mobilewright-android-reads
          - script: docker rm -f android-emulator || true
            displayName: 'Stop emulator'
            condition: always()
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

