# =============================================================================
# AHM Execution Helix — Unified CI Workflow
#
# Consolidates: API E2E, Web E2E, Android E2E, iOS E2E, and Gatling Perf into
# a single file with conditional jobs controlled by the `platform` input, AND
# (as of the architecture_type consolidation) folds in what used to be the
# separate `tom-quantitative-execution.yml` workflow. `architecture_type`
# (`standard` | `TOM`) selects which reporting/metrics tail each job runs:
# `standard` parses telemetry to CSV (the original AHM path); `TOM` stamps
# every artifact/record with experiment identity and runs the quantitative-
# architecture metrics pipeline, plus the extra `consolidate` job. Every other
# job/step is shared between both architecture_type values.
# =============================================================================

name: AHM — Execution Helix

on:
  # Auto-triggers temporarily disabled — run only via manual dispatch while
  # this workflow's job surface continues to evolve. Re-enable push/pull_request
  # when ready to restore automatic CI for this workflow.
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: false
        default: all
        type: choice
        options: [all, api, web, playwright, playwright-desktop, playwright-responsive, pixelmatch, pixelmatch-desktop, pixelmatch-responsive, mobile, android, ios, appium, appium-android, appium-ios, perf, gatling, mobilewright, security, a11y, cypress, webdriverio]
      architecture_type:
        description: 'Pipeline identity — selects the reporting/metrics tail'
        required: false
        default: standard
        type: choice
        options: [standard, TOM]
      experiment_batch_id:
        description: 'Experiment batch id (TOM only — groups repeated runs)'
        required: false
        default: batch-adhoc
      run_index:
        description: 'Run index within the batch (TOM only)'
        required: false
        default: '001'
      perf_profile:
        description: 'Gatling injection profile (perf only)'
        required: false
        default: smoke
        type: choice
        options: [smoke, load, stress]
      perf_users:
        description: 'Virtual user count (perf load/stress)'
        required: false
        default: '20'
      perf_duration:
        description: 'Ramp duration in seconds (perf load only)'
        required: false
        default: '120'
      android_api_level:
        description: 'Android API level'
        required: false
        default: '33'
        type: choice
        options: ['28', '29', '30', '31', '32', '33']

# ---------------------------------------------------------------------------
# Shared environment — inherited by every job. The ARCHITECTURE_TYPE through
# BRANCH_NAME vars carry the experimental identity the TOM metrics layer
# stamps onto every record; they are harmless no-ops when
# architecture_type=standard since nothing reads them outside the TOM-gated
# metrics steps in each job below.
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ARCHITECTURE_TYPE: ${{ inputs.architecture_type || 'standard' }}
  EXPERIMENT_BATCH_ID: ${{ inputs.experiment_batch_id || 'batch-adhoc' }}
  RUN_INDEX: ${{ inputs.run_index || github.run_attempt }}
  REPOSITORY_NAME: ${{ github.repository }}
  WORKFLOW_RUN_ID: ${{ github.run_id }}
  WORKFLOW_ATTEMPT: ${{ github.run_attempt }}
  COMMIT_SHA: ${{ github.sha }}
  BRANCH_NAME: ${{ github.ref_name }}
  NODE_VERSION: '22'
  LOG_LEVEL: info
  # OmniPizza release base URL is resolved dynamically by the
  # `resolve-omnipizza-release` job (queries GitHub's /releases/latest)
  # and consumed by the mobile jobs via `needs.<job>.outputs.base_url`.
  OMNIPIZZA_RELEASES_REPO: gsanchezm/OmniPizza
  PLAYWRIGHT_VERSION: '1.61.1'
  PLAYWRIGHT_IMAGE: mcr.microsoft.com/playwright:v1.61.1-jammy

# Keep only the newest run for a ref. Cross-ref and cross-workflow writes are
# independently serialized by the job-level standard-user-writes group.
concurrency:
  group: helix-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOBS
# =============================================================================
jobs:

  gate-api:
    name: Gate — API
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'api'
    steps:
      - run: echo "API selected"

  gate-web-desktop:
    name: Gate — Playwright Desktop
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'web'
      || inputs.platform == 'playwright'
      || inputs.platform == 'playwright-desktop'
      || inputs.platform == 'pixelmatch'
      || inputs.platform == 'pixelmatch-desktop'
    steps:
      - run: echo "Web desktop selected"

  gate-web-responsive:
    name: Gate — Playwright Responsive
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'web'
      || inputs.platform == 'playwright'
      || inputs.platform == 'playwright-responsive'
      || inputs.platform == 'pixelmatch'
      || inputs.platform == 'pixelmatch-responsive'
    steps:
      - run: echo "Web responsive selected"

  gate-android:
    name: Gate — Appium Android
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'mobile'
      || inputs.platform == 'android'
      || inputs.platform == 'appium'
      || inputs.platform == 'appium-android'
    steps:
      - run: echo "Android selected"

  gate-ios:
    name: Gate — Appium iOS
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'mobile'
      || inputs.platform == 'ios'
      || inputs.platform == 'appium'
      || inputs.platform == 'appium-ios'
    steps:
      - run: echo "iOS selected"

  gate-gatling:
    name: Gate — Gatling
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'perf'
      || inputs.platform == 'gatling'

    steps:
      - run: echo "Gatling selected"

  gate-mobilewright:
    name: Gate — Mobilewright
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'mobilewright'
    steps:
      - run: echo "Mobilewright selected"

  # Coarse platform value only — there is no finer-grained `zap`/`mobsf`
  # dispatch value. Both security-zap and security-mobsf gate on this same
  # 'security' value (see README's CI/CD section for the tag/job rationale).
  gate-security:
    name: Gate — Security
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'security'
    steps:
      - run: echo "Security selected"

  gate-a11y:
    name: Gate — Accessibility
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'a11y'
    steps:
      - run: echo "Accessibility selected"

  gate-cypress:
    name: Gate — Cypress
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'cypress'
    steps:
      - run: echo "Cypress selected"

  gate-webdriverio:
    name: Gate — WebdriverIO
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'webdriverio'
    steps:
      - run: echo "WebdriverIO selected"

  # ---------------------------------------------------------------------------
  # Resolver: latest OmniPizza release
  #
  # Queries GitHub's `/releases/latest` for the OmniPizza repo and exposes
  # the tag + download base URL as job outputs. Mobile jobs consume these
  # via `needs.resolve-omnipizza-release.outputs.*` so the workflow always
  # tests against the freshest published APK / simulator bundle without
  # editing this file each release. Gated on mobile being selected (either
  # by the coarse `mobile`/`android`/`ios` values or the granular
  # `appium`/`appium-android`/`appium-ios` values TOM's dispatch used) so the
  # API call is skipped when only API/Web/Perf are dispatched. `mobilewright`
  # is included here too — e2e-mobilewright downloads the same OmniPizza
  # APK/simulator bundle as e2e-android/e2e-ios and consumes this job's
  # outputs the same way. `security` is included too — security-mobsf needs
  # this job's outputs to download both platform binaries for its static
  # scan; without this, a `platform=security` dispatch would skip this
  # resolver and cascade-skip security-mobsf (which `needs:` it).
  # ---------------------------------------------------------------------------
  resolve-omnipizza-release:
    name: Resolve — OmniPizza latest release
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.platform == 'all'
      || inputs.platform == 'mobile'
      || inputs.platform == 'android'
      || inputs.platform == 'ios'
      || inputs.platform == 'appium'
      || inputs.platform == 'appium-android'
      || inputs.platform == 'appium-ios'
      || inputs.platform == 'mobilewright'
      || inputs.platform == 'security'
    outputs:
      tag: ${{ steps.fetch.outputs.tag }}
      base_url: ${{ steps.fetch.outputs.base_url }}
    steps:
      - name: Fetch latest release tag
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OMNIPIZZA_RELEASES_REPO}/releases/latest" \
            | jq -r .tag_name)
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to resolve latest OmniPizza release tag."
            exit 1
          fi
          BASE_URL="https://github.com/${OMNIPIZZA_RELEASES_REPO}/releases/download/${TAG}"
          echo "Resolved OmniPizza release: $TAG"
          echo "Download base URL: $BASE_URL"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 1: API E2E
  # ---------------------------------------------------------------------------
  api-smoke:
    name: E2E — API ${{ matrix.suite }}
    needs: gate-api
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('api-reads-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        suite: [reads, writes]
    env:
      TOOL_NAME: api
      PLATFORM: api
      DRIVER: api
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-api-{3}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite)
            || format('gh-{0}-{1}-api-{2}', github.run_id, github.run_attempt, matrix.suite) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start proxy + API plugin
        run: bash ci/steps/start-stack.sh api
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run Cucumber suite (API layer)
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@api and not @writes-shared-state"
          else
            TAG_EXPRESSION="@api and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" api ${{ matrix.suite }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh api

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ github.run_id }}
          path: artifacts/api/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 2: Web E2E — Desktop (reads/writes x browser)
  #
  # Runs the @desktop slice of every feature inside the pinned Playwright
  # container with `PLUGIN_PIXELMATCH=false` so the `@visual` After hooks in
  # each slice self-skip — no COMPARE_SNAPSHOT round-trip, no per-scenario
  # screenshot capture, ~30-40% faster wall time than the combined job it
  # replaced. The corresponding visual capture lives in `visual-web` below,
  # which `needs: e2e-web` so the two never race on the shared
  # `standard_user` row (the FE Save handler still ships its PATCH async,
  # see BUG_profile_ui_save_does_not_await_patch.md). Container image is
  # the same as `visual-web` and `update-visual-baselines.yml` so any
  # rendering parity needed for the visual pass is also present here.
  # ---------------------------------------------------------------------------
  e2e-web:
    name: E2E — Playwright Desktop ${{ matrix.suite }} (${{ matrix.browser }})
    needs: gate-web-desktop
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('web-reads-{0}-{1}-desktop-{2}', github.run_id, github.run_attempt, matrix.browser) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        suite: [reads, writes]

    # Pinned Playwright container. Kept identical to the visual job so a
    # functional regression that depends on rendering shows up in the same
    # environment that captures baselines.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --user 0

    env:
      TOOL_NAME: playwright
      PLATFORM: web
      VIEWPORT: desktop
      DRIVER: playwright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-playwright-desktop-{3}-{4}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite, matrix.browser)
            || format('gh-{0}-{1}-desktop-{2}-{3}', github.run_id, github.run_attempt, matrix.suite, matrix.browser) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright browsers + system deps are baked into the container, so
      # no `npx playwright install` step is needed here. MinIO telemetry is
      # also dropped from this job — the visual oracle's source of truth
      # for the gate is `visual-results/*/result.json`, which travels as a
      # workflow artifact regardless of MinIO availability.

      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh web
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: ${{ matrix.browser }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
          API_ADAPTER_ADDRESS: 127.0.0.1:50055
          PLUGIN_PLAYWRIGHT: 'true'
          # Pixelmatch off in the functional pass — the @visual After hooks
          # self-skip when this is false, removing the per-scenario
          # screenshot + diff round-trip. Visual capture happens in the
          # dedicated visual-web job.
          PLUGIN_PIXELMATCH: 'false'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@desktop and not @writes-shared-state"
          else
            TAG_EXPRESSION="@desktop and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" playwright-desktop ${{ matrix.browser }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: ${{ matrix.browser }}
          CUCUMBER_PARALLEL: '4'
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          # Belt + suspenders: the hook reads this at scenario time, the
          # plugin reads it at startup. Set in both places so the plugin
          # doesn't load capability it won't use AND the hook self-skips
          # if the plugin ever did register the capability.
          PLUGIN_PIXELMATCH: 'false'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-logs-${{ github.job }}-${{ matrix.suite }}-${{ matrix.browser }}-${{ github.run_id }}
          path: /tmp/ahm-ci-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh playwright-desktop

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ matrix.browser }}-${{ github.run_id }}
          path: artifacts/playwright-desktop/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 3: Web E2E — Responsive (reads/writes x browser)
  # Mirrors Job 2's design (pinned container, no pixelmatch). See Job 2's
  # header for the full rationale and the link to visual-web-responsive.
  # ---------------------------------------------------------------------------
  e2e-web-responsive:
    name: E2E — Playwright Responsive ${{ matrix.suite }} (${{ matrix.browser }})
    needs: gate-web-responsive
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('web-reads-{0}-{1}-responsive-{2}', github.run_id, github.run_attempt, matrix.browser) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        suite: [reads, writes]

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --user 0

    env:
      TOOL_NAME: playwright
      PLATFORM: web
      VIEWPORT: responsive
      DRIVER: playwright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-playwright-responsive-{3}-{4}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite, matrix.browser)
            || format('gh-{0}-{1}-responsive-{2}-{3}', github.run_id, github.run_attempt, matrix.suite, matrix.browser) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh web
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: ${{ matrix.browser }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          HEADLESS: 'true'
          PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
          API_ADAPTER_ADDRESS: 127.0.0.1:50055
          PLUGIN_PLAYWRIGHT: 'true'
          # Pixelmatch off — see e2e-web for full rationale.
          PLUGIN_PIXELMATCH: 'false'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@responsive and not @writes-shared-state"
          else
            TAG_EXPRESSION="@responsive and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" playwright-responsive ${{ matrix.browser }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: ${{ matrix.browser }}
          CUCUMBER_PARALLEL: '4'
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_PIXELMATCH: 'false'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-logs-${{ github.job }}-${{ matrix.suite }}-${{ matrix.browser }}-${{ github.run_id }}
          path: /tmp/ahm-ci-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh playwright-responsive

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ matrix.browser }}-${{ github.run_id }}
          path: artifacts/playwright-responsive/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 2b: Visual — Playwright Desktop (Pixelmatch capture + gate)
  #
  # `needs: e2e-web` — sequential within the desktop line. Two reasons:
  #   1. visual-web re-runs the same scenarios that e2e-web just ran. Running
  #      both in parallel against the live OmniPizza tenant means two
  #      PATCH-then-read sequences on the shared `standard_user` row at the
  #      same instants — exactly the race documented in
  #      BUG_profile_ui_save_does_not_await_patch.md. Sequencing eliminates
  #      that overlap without per-job test users.
  #   2. If e2e-web reports a functional break, visual capture against a
  #      broken page is noise — the visual baselines would diverge for a
  #      reason that has nothing to do with rendering. We still run visual
  #      on `if: always()` so a functional red doesn't hide visual red, but
  #      sequencing keeps the timeline interpretable.
  # Desktop/responsive read legs run freely in parallel. Visual jobs join the
  # same standard-user write queue because they include tagged write scenarios.
  # (The now-folded-in TOM workflow also chained pixelmatch-responsive after
  # pixelmatch-desktop for the same shared-fixture reason; kept here as the
  # shared standard-user-writes concurrency group only — see design doc §3.5
  # for why the extra needs: edge is intentionally NOT carried over.)
  # ---------------------------------------------------------------------------
  visual-web:
    name: Visual — Playwright Desktop (Pixelmatch)
    needs: e2e-web
    if: always() && needs.e2e-web.result != 'skipped' && needs.e2e-web.result != 'cancelled'
    runs-on: ubuntu-latest
    concurrency:
      group: standard-user-writes
      cancel-in-progress: false
      queue: max

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --user 0

    env:
      TOOL_NAME: pixelmatch
      PLATFORM: web
      VIEWPORT: desktop
      DRIVER: playwright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-pixelmatch-desktop', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-desktop-visual', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh web
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
          PIXELMATCH_ADDRESS: 127.0.0.1:50056
          API_ADAPTER_ADDRESS: 127.0.0.1:50055
          PLUGIN_PLAYWRIGHT: 'true'
          # Pixelmatch on — visual capture is this job's whole reason for
          # existing. Co-loaded inside the playwright plugin (see
          # plugins.config.ts) so it can read the active browser session.
          PLUGIN_PIXELMATCH: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run visual capture (standard)
        if: ${{ inputs.architecture_type != 'TOM' }}
        run: pnpm test:json:visual:desktop
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_PIXELMATCH: 'true'

      - name: Run visual capture (TOM)
        # COMPARE against the committed baselines (the gate). `test:json:visual:desktop`
        # (the standard-path step above) maps to scripts/visual-regen.js which WIPES +
        # regenerates baselines and forces VISUAL_UPDATE_BASELINE=true (local-iteration
        # only) — use the compare script here so the TOM path's visual gate actually
        # validates against visual-baselines/.
        if: ${{ inputs.architecture_type == 'TOM' }}
        run: pnpm test:json:visual:compare:desktop
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_PIXELMATCH: 'true'
          VISUAL_UPDATE_BASELINE: 'false'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Visual gate — fail the job if any snapshot drifted
        # Cucumber stays green on drift (the visual hook swallows
        # COMPARE_SNAPSHOT failures). This step is the explicit gate: walks
        # `visual-results/<runId>/.../result.json` and exits 1 if any entry
        # has status=FAIL. Functional regressions (e2e-web) and visual
        # regressions stay independently visible.
        if: success() || failure()
        run: node scripts/visual-gate.js

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-logs-${{ github.job }}-${{ github.run_id }}
          path: /tmp/ahm-ci-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-results-desktop-${{ github.run_id }}
          path: visual-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh playwright-visual-desktop

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}
          path: artifacts/playwright-visual-desktop/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 3b: Visual — Playwright Responsive (Pixelmatch capture + gate)
  # Mirrors visual-web. `needs: e2e-web-responsive`; both visual jobs share
  # the standard-user write queue.
  # ---------------------------------------------------------------------------
  visual-web-responsive:
    name: Visual — Playwright Responsive (Pixelmatch)
    needs: e2e-web-responsive
    if: always() && needs.e2e-web-responsive.result != 'skipped' && needs.e2e-web-responsive.result != 'cancelled'
    runs-on: ubuntu-latest
    concurrency:
      group: standard-user-writes
      cancel-in-progress: false
      queue: max

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --user 0

    env:
      TOOL_NAME: pixelmatch
      PLATFORM: web
      VIEWPORT: responsive
      DRIVER: playwright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-pixelmatch-responsive', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-responsive-visual', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh web
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          HEADLESS: 'true'
          PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
          PIXELMATCH_ADDRESS: 127.0.0.1:50056
          API_ADAPTER_ADDRESS: 127.0.0.1:50055
          PLUGIN_PLAYWRIGHT: 'true'
          PLUGIN_PIXELMATCH: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run visual capture (standard)
        if: ${{ inputs.architecture_type != 'TOM' }}
        run: pnpm test:json:visual:responsive
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_PIXELMATCH: 'true'

      - name: Run visual capture (TOM)
        # COMPARE against the committed baselines — see visual-web's identical note.
        if: ${{ inputs.architecture_type == 'TOM' }}
        run: pnpm test:json:visual:compare:responsive
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: web
          VIEWPORT: responsive
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_PIXELMATCH: 'true'
          VISUAL_UPDATE_BASELINE: 'false'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Visual gate — fail the job if any snapshot drifted
        if: success() || failure()
        run: node scripts/visual-gate.js

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-logs-${{ github.job }}-${{ github.run_id }}
          path: /tmp/ahm-ci-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-results-responsive-${{ github.run_id }}
          path: visual-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh playwright-visual-responsive

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}
          path: artifacts/playwright-visual-responsive/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: Accessibility (axe) — web-job variant, not a standalone service
  #
  # Axe is co-located inside the Playwright plugin process (same pattern as
  # Pixelmatch) — there is no dedicated a11y port or start-stack.sh case arm.
  # This job calls the existing `web` arm with PLUGIN_AXE=true forwarded into
  # THAT call's env, because axe's actions are only registered into the
  # Playwright action registry when PLUGIN_AXE=true is set at the plugin
  # process's own startup (see registerPlaywrightActions.ts / plugins.config.ts) —
  # setting it only on the test-runner step (as package.json's `test:a11y`
  # script does locally) would not reach the already-running plugin process.
  # Single cell, no browser/suite matrix: `@a11y` currently tags exactly one
  # read-only scenario (browse-catalog.feature), so a matrix would just
  # re-run the identical scenario N times and collide on reports/a11y.json.
  # ---------------------------------------------------------------------------
  a11y-web:
    name: A11y — Playwright Desktop (axe)
    needs: gate-a11y
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('a11y-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --user 0

    env:
      TOOL_NAME: playwright
      PLATFORM: web
      VIEWPORT: desktop
      DRIVER: playwright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-a11y', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-a11y', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh web
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: chromium
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          HEADLESS: 'true'
          PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
          API_ADAPTER_ADDRESS: 127.0.0.1:50055
          PLUGIN_PLAYWRIGHT: 'true'
          PLUGIN_PIXELMATCH: 'false'
          # Must reach the plugin process's own startup env — see the job
          # header comment above.
          PLUGIN_AXE: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run accessibility suite
        shell: bash
        run: bash ci/steps/run-suite.sh "@a11y" a11y
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: chromium
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: playwright
          PROXY_ADDRESS: 127.0.0.1:50051
          HEADLESS: 'true'
          PLUGIN_AXE: 'true'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh a11y

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}
          path: artifacts/a11y/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 4: Android E2E
  # ---------------------------------------------------------------------------
  e2e-android:
    name: E2E — Appium Android ${{ matrix.suite }}
    needs: [gate-android, resolve-omnipizza-release]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('android-reads-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        suite: [reads, writes]
    env:
      TOOL_NAME: appium-android
      PLATFORM: android
      DRIVER: appium
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-appium-android-{3}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite)
            || format('gh-{0}-{1}-android-{2}', github.run_id, github.run_attempt, matrix.suite) }}

    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Android platform tools
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-platform-tools
          adb version

      - name: Download Android app artifact
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/android
          echo "Downloading OmniPizza Android APK from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
            -o assets/apps/android/app-release.apk
          ls -lh assets/apps/android/app-release.apk

      - name: Start MinIO Telemetry Storage
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start Android emulator (docker-android)
        run: |
          docker run -d \
            --name android-emulator \
            --privileged \
            --device /dev/kvm \
            -p 5554:5554 \
            -p 5555:5555 \
            -e API_LEVEL=${{ inputs.android_api_level || '33' }} \
            -e IMG_TYPE=google_apis \
            -e ARCHITECTURE=x86_64 \
            -e DEVICE_ID=pixel \
            -e MEMORY=4096 \
            -e CORES=2 \
            -e DISABLE_ANIMATION=true \
            -e DISABLE_HIDDEN_POLICY=true \
            -e SKIP_AUTH=1 \
            halimqarroum/docker-android:api-${{ inputs.android_api_level || '33' }}

      - name: Start Appium server
        run: |
          pnpm exec appium --relaxed-security &
          sleep 5

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for ADB device to appear..."
          adb connect localhost:5555
          for i in $(seq 1 40); do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "Emulator ready after $((i * 15))s"
              break
            fi
            echo "  Attempt $i/40 — waiting 15s..."
            sleep 15
          done
          adb devices

      - name: Start proxy + Appium plugin
        run: bash ci/steps/start-stack.sh android
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: docker_android
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          PLUGIN_APPIUM: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        id: android_tests
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@android and not @writes-shared-state"
          else
            TAG_EXPRESSION="@android and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" android ${{ matrix.suite }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: docker_android
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Show Android emulator logs
        if: failure()
        run: |
          docker ps -a --filter name=android-emulator
          if docker ps -a --format '{{.Names}}' | grep -qx android-emulator; then
            docker logs --tail 200 android-emulator
          else
            echo "android-emulator container was not created."
          fi

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh android

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ github.run_id }}
          path: artifacts/android/
          if-no-files-found: ignore
          retention-days: 30

      - name: Stop emulator
        if: always()
        run: docker rm -f android-emulator || true

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 5: iOS E2E
  # ---------------------------------------------------------------------------
  e2e-ios:
    name: E2E — Appium iOS ${{ matrix.suite }}
    needs: [gate-ios, resolve-omnipizza-release]
    runs-on: macos-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('ios-reads-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        suite: [reads, writes]
    env:
      TOOL_NAME: appium-ios
      PLATFORM: ios
      DRIVER: appium
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-appium-ios-{3}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite)
            || format('gh-{0}-{1}-ios-{2}', github.run_id, github.run_attempt, matrix.suite) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download iOS simulator artifact
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/ios
          echo "Downloading OmniPizza iOS simulator bundle from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
            -o assets/apps/ios/OmniPizza-Simulator.zip
          ls -lh assets/apps/ios/OmniPizza-Simulator.zip

      - name: Unpack iOS simulator app
        run: |
          rm -rf assets/apps/ios/unpacked
          mkdir -p assets/apps/ios/unpacked
          unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
          IOS_APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
          if [ -z "$IOS_APP_PATH" ]; then
            echo "No .app bundle found inside OmniPizza-Simulator.zip"
            exit 1
          fi
          echo "IOS_APP_PATH=$IOS_APP_PATH" >> "$GITHUB_ENV"

      - name: Select and boot iOS simulator
        run: |
          DEVICE_LINE=$(xcrun simctl list devices available | grep -E 'iPhone .*\([A-F0-9-]+\) \((Shutdown|Booted)\)' | head -n 1)
          if [ -z "$DEVICE_LINE" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          IOS_DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^[[:space:]]*([^()]+)[[:space:]]+\(.*/\1/' | xargs)
          IOS_UDID=$(echo "$DEVICE_LINE" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "IOS_DEVICE_NAME=$IOS_DEVICE_NAME" >> "$GITHUB_ENV"
          echo "IOS_UDID=$IOS_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$IOS_UDID" || true
          xcrun simctl bootstatus "$IOS_UDID" -b

      - name: Start MinIO Telemetry Storage
        run: |
          MACHINE_ARCH=$(uname -m)
          MINIO_ARCH=$(node -p "({ arm64: 'arm64', x86_64: 'amd64' })[process.argv[1]] || ''" "$MACHINE_ARCH")
          if [ -z "$MINIO_ARCH" ]; then
            echo "Unsupported macOS architecture: $MACHINE_ARCH"
            exit 1
          fi

          curl -fL "https://dl.min.io/server/minio/release/darwin-${MINIO_ARCH}/minio" \
            -o /tmp/minio
          chmod +x /tmp/minio

          mkdir -p /tmp/ahm-minio-data
          MINIO_ROOT_USER=minioadmin \
          MINIO_ROOT_PASSWORD=minioadmin \
            /tmp/minio server /tmp/ahm-minio-data --address ":9000" --console-address ":9001" &

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 1
          done

          echo "MinIO did not become healthy"
          exit 1

      - name: Start Appium server
        run: |
          pnpm exec appium --relaxed-security &
          sleep 5

      - name: Start proxy + Appium plugin
        run: bash ci/steps/start-stack.sh ios
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ios
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: ci_ios_headless
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}
          PLUGIN_APPIUM: 'true'
          PLUGIN_API: 'true'
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@ios and not @writes-shared-state"
          else
            TAG_EXPRESSION="@ios and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" ios ${{ matrix.suite }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ios
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: '4723'
          CAP_PROFILE: ci_ios_headless
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}
          # --- MINIO VARS REQUIRED FOR TELEMETRY ---
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh ios

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ github.run_id }}
          path: artifacts/ios/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: Mobilewright E2E (Android + iOS)
  #
  # KNOWN GAP — do not "fix" by editing src/devices/*.json (out of this
  # task's file scope): docker_android.json and ci_ios_headless.json need
  # "mobilewright" added to their compatibleDrivers array before this job can
  # pass — mobilewright-adapter.ts tolerates a passport with no mobilewright
  # config block (it spreads passport.mobilewright ?? {}), so the array
  # entry alone is sufficient, no other device-file changes needed. Today
  # this job is structurally wired (proxy + mobilewright plugin + api plugin
  # all start fine) but WILL FAIL at DeviceLoader.forWorker() with "device
  # 'docker_android'/'ci_ios_headless' ... is not compatible with
  # DRIVER='mobilewright'" — only the non-CI, named-physical-device
  # passports (galaxy_s25_ultra.json, iphone_16_pro.json, iphone_17_pro.json,
  # z_flip_6.json) currently list "mobilewright" as compatible, and none of
  # those are usable in a headless CI runner. It is manual-dispatch-only
  # today (push/PR triggers are commented out above), so a job that fails
  # when someone actually dispatches platform=mobilewright does not pollute
  # any automatic run.
  # ---------------------------------------------------------------------------
  e2e-mobilewright:
    name: E2E — Mobilewright ${{ matrix.platform }} ${{ matrix.suite }}
    needs: [gate-mobilewright, resolve-omnipizza-release]
    runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('mobilewright-reads-{0}-{1}-{2}', github.run_id, github.run_attempt, matrix.platform) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
        suite: [reads, writes]
    env:
      TOOL_NAME: mobilewright
      PLATFORM: ${{ matrix.platform }}
      DRIVER: mobilewright
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-mobilewright-{3}-{4}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.platform, matrix.suite)
            || format('gh-{0}-{1}-mobilewright-{2}-{3}', github.run_id, github.run_attempt, matrix.platform, matrix.suite) }}

    steps:
      - uses: actions/checkout@v6

      - name: Enable KVM
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        if: matrix.platform == 'android'
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Android platform tools
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk-platform-tools
          adb version

      - name: Download Android app artifact
        if: matrix.platform == 'android'
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/android
          echo "Downloading OmniPizza Android APK from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
            -o assets/apps/android/app-release.apk
          ls -lh assets/apps/android/app-release.apk

      - name: Download iOS simulator artifact
        if: matrix.platform == 'ios'
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/ios
          echo "Downloading OmniPizza iOS simulator bundle from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
            -o assets/apps/ios/OmniPizza-Simulator.zip
          ls -lh assets/apps/ios/OmniPizza-Simulator.zip

      - name: Unpack iOS simulator app
        if: matrix.platform == 'ios'
        run: |
          rm -rf assets/apps/ios/unpacked
          mkdir -p assets/apps/ios/unpacked
          unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
          IOS_APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
          if [ -z "$IOS_APP_PATH" ]; then
            echo "No .app bundle found inside OmniPizza-Simulator.zip"
            exit 1
          fi
          echo "IOS_APP_PATH=$IOS_APP_PATH" >> "$GITHUB_ENV"

      - name: Select and boot iOS simulator
        if: matrix.platform == 'ios'
        run: |
          DEVICE_LINE=$(xcrun simctl list devices available | grep -E 'iPhone .*\([A-F0-9-]+\) \((Shutdown|Booted)\)' | head -n 1)
          if [ -z "$DEVICE_LINE" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          IOS_DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^[[:space:]]*([^()]+)[[:space:]]+\(.*/\1/' | xargs)
          IOS_UDID=$(echo "$DEVICE_LINE" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "IOS_DEVICE_NAME=$IOS_DEVICE_NAME" >> "$GITHUB_ENV"
          echo "IOS_UDID=$IOS_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$IOS_UDID" || true
          xcrun simctl bootstatus "$IOS_UDID" -b

      - name: Start MinIO Telemetry Storage (Linux)
        if: matrix.platform == 'android'
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose -f infrastructure/minio-compose.yml up -d
          else
            docker-compose -f infrastructure/minio-compose.yml up -d
          fi
          sleep 5

      - name: Start MinIO Telemetry Storage (macOS)
        if: matrix.platform == 'ios'
        run: |
          MACHINE_ARCH=$(uname -m)
          MINIO_ARCH=$(node -p "({ arm64: 'arm64', x86_64: 'amd64' })[process.argv[1]] || ''" "$MACHINE_ARCH")
          if [ -z "$MINIO_ARCH" ]; then
            echo "Unsupported macOS architecture: $MACHINE_ARCH"
            exit 1
          fi

          curl -fL "https://dl.min.io/server/minio/release/darwin-${MINIO_ARCH}/minio" \
            -o /tmp/minio
          chmod +x /tmp/minio

          mkdir -p /tmp/ahm-minio-data
          MINIO_ROOT_USER=minioadmin \
          MINIO_ROOT_PASSWORD=minioadmin \
            /tmp/minio server /tmp/ahm-minio-data --address ":9000" --console-address ":9001" &

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 1
          done

          echo "MinIO did not become healthy"
          exit 1

      - name: Start Android emulator (docker-android)
        if: matrix.platform == 'android'
        run: |
          docker run -d \
            --name android-emulator \
            --privileged \
            --device /dev/kvm \
            -p 5554:5554 \
            -p 5555:5555 \
            -e API_LEVEL=${{ inputs.android_api_level || '33' }} \
            -e IMG_TYPE=google_apis \
            -e ARCHITECTURE=x86_64 \
            -e DEVICE_ID=pixel \
            -e MEMORY=4096 \
            -e CORES=2 \
            -e DISABLE_ANIMATION=true \
            -e DISABLE_HIDDEN_POLICY=true \
            -e SKIP_AUTH=1 \
            halimqarroum/docker-android:api-${{ inputs.android_api_level || '33' }}

      - name: Wait for emulator to be ready
        if: matrix.platform == 'android'
        run: |
          echo "Waiting for ADB device to appear..."
          adb connect localhost:5555
          for i in $(seq 1 40); do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "Emulator ready after $((i * 15))s"
              break
            fi
            echo "  Attempt $i/40 — waiting 15s..."
            sleep 15
          done
          adb devices

      # No Appium server is started here — mobilewright drives devices via
      # `mobilecli`, not Appium/WebDriverIO remote() (mobilewrightNeedsAppiumServer:
      # false — see ci/pipeline.config.json). start-stack.sh's `mobilewright`
      # arm only waits on the gRPC ports below.
      - name: Start proxy + Mobilewright plugin
        run: bash ci/steps/start-stack.sh mobilewright
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ${{ matrix.platform }}
          DRIVER: mobilewright
          CAP_PROFILE: ${{ matrix.platform == 'android' && 'docker_android' || 'ci_ios_headless' }}
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}
          PLUGIN_MOBILEWRIGHT: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "android" ]; then
            BASE_TAG="@android"
          else
            BASE_TAG="@ios"
          fi
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="$BASE_TAG and not @writes-shared-state"
          else
            TAG_EXPRESSION="$BASE_TAG and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" mobilewright "${{ matrix.platform }}-${{ matrix.suite }}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: ${{ matrix.platform }}
          DRIVER: mobilewright
          CAP_PROFILE: ${{ matrix.platform == 'android' && 'docker_android' || 'ci_ios_headless' }}
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          ANDROID_UDID: localhost:5555
          IOS_APP_PATH: ${{ vars.IOS_APP_PATH || env.IOS_APP_PATH }}
          IOS_UDID: ${{ env.IOS_UDID }}
          IOS_DEVICE_NAME: ${{ env.IOS_DEVICE_NAME }}
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Show Android emulator logs
        if: failure() && matrix.platform == 'android'
        run: |
          docker ps -a --filter name=android-emulator
          if docker ps -a --format '{{.Names}}' | grep -qx android-emulator; then
            docker logs --tail 200 android-emulator
          else
            echo "android-emulator container was not created."
          fi

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh mobilewright

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.platform }}-${{ matrix.suite }}-${{ github.run_id }}
          path: artifacts/mobilewright/
          if-no-files-found: ignore
          retention-days: 30

      - name: Stop emulator
        if: always() && matrix.platform == 'android'
        run: docker rm -f android-emulator || true

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: Security — ZAP (active API scan gate + baseline/TLS half of infra scan)
  #
  # No `@mobsf` tag exists in this codebase (grepped every .feature file).
  # `@security` (login/features/api-security.feature) is the hard-gating ZAP
  # active-scan + schema-fuzz suite. `@security-infra`
  # (support/features/security-infra.feature) is ONE scenario that does ZAP
  # baseline crawl + TLS check + MobSF static analysis in sequence — it is
  # deliberately run from BOTH this job and security-mobsf below, split by
  # which plugin is actually live in each. security-infra.route.ts's own
  # per-plugin enabled checks (PLUGIN_ZAP/PLUGIN_MOBSF) make the unused half
  # a non-fatal log.warn, not a failure, so running the same tag twice here
  # is safe, not a bug. Do not "fix" this back to a `@mobsf` tag that does
  # not exist.
  # ---------------------------------------------------------------------------
  security-zap:
    name: Security — ZAP
    needs: gate-security
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('security-zap-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    env:
      TOOL_NAME: zap
      PLATFORM: api
      DRIVER: api
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-security-zap', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-security-zap', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # RunZapScan.ts shells out to `docker run --rm ghcr.io/zaproxy/zaproxy:stable`
      # itself, per-scan — Docker just needs to be available (already true on
      # ubuntu-latest), no separate `docker run` step needed here.
      - name: Start proxy + API + ZAP plugin
        run: bash ci/steps/start-stack.sh zap
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_ZAP: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run security suite (API gate)
        shell: bash
        run: bash ci/steps/run-suite.sh "@security" zap security
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_ZAP: 'true'

      # `if: success() || failure()` — without this, GitHub's implicit
      # `success()` on the previous (hard-gating) @security step would skip
      # this record-only suite entirely whenever the gate trips, losing the
      # infra recording on exactly the runs where it matters most. Ground
      # truth §1 calls for running BOTH suites against this one stack
      # unconditionally; this guard is what makes that true even on a
      # @security failure (still skips on job cancellation).
      - name: Run security-infra suite (ZAP baseline + TLS; MobSF self-skips)
        if: success() || failure()
        shell: bash
        run: bash ci/steps/run-suite.sh "@security-infra" zap security-infra
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_ZAP: 'true'

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh zap

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}
          path: artifacts/zap/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: Security — MobSF (long-lived server, MobSF half of the infra scan)
  #
  # Downloads both the Android APK and the iOS .app bundle fresh every run
  # (no caching) so support.security.json's `mobile.mobsf[]` entries resolve
  # to real files — see the two download steps below. Runs entirely on
  # ubuntu-latest: MobSF only needs the static .app bundle on disk, not a
  # booted simulator, so the iOS leg needs no macOS runner.
  # ---------------------------------------------------------------------------
  security-mobsf:
    name: Security — MobSF
    needs: [gate-security, resolve-omnipizza-release]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('security-mobsf-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    env:
      TOOL_NAME: mobsf
      PLATFORM: api
      DRIVER: api
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-security-mobsf', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-security-mobsf', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # filePath must match support.security.json's `mobile.mobsf[]` entries
      # exactly: "assets/apps/android/omnipizza-release.apk" — NOT renamed to
      # app-release.apk the way e2e-android's own copy is.
      - name: Download Android APK for MobSF scan
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/android
          echo "Downloading OmniPizza Android APK from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
            -o assets/apps/android/omnipizza-release.apk
          ls -lh assets/apps/android/omnipizza-release.apk

      # support.security.json's ios mobsf entry expects a literal .app
      # DIRECTORY at "assets/apps/ios/OmniPizza.app" (security-infra.route.ts's
      # resolveArtifact()/packageIpa() check `statSync(abs).isDirectory() &&
      # abs.endsWith('.app')`). No booted simulator or macOS runner needed —
      # MobSF only reads the static bundle on disk.
      - name: Download + unpack iOS app for MobSF scan
        env:
          OMNIPIZZA_RELEASE_BASE_URL: ${{ needs.resolve-omnipizza-release.outputs.base_url }}
          OMNIPIZZA_RELEASE_TAG: ${{ needs.resolve-omnipizza-release.outputs.tag }}
        run: |
          mkdir -p assets/apps/ios
          echo "Downloading OmniPizza iOS simulator bundle from release ${OMNIPIZZA_RELEASE_TAG}"
          curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
            -o assets/apps/ios/OmniPizza-Simulator.zip
          rm -rf assets/apps/ios/unpacked assets/apps/ios/OmniPizza.app
          mkdir -p assets/apps/ios/unpacked
          unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
          APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found inside OmniPizza-Simulator.zip"
            exit 1
          fi
          cp -R "$APP_PATH" assets/apps/ios/OmniPizza.app
          ls -ld assets/apps/ios/OmniPizza.app

      # Brings up its own MobSF container (docker run -d --name mobsf ...,
      # pinned image opensecurity/mobile-security-framework-mobsf:v3.9.7),
      # health-polls :8000, scrapes MOBSF_API_KEY from the container's own
      # startup logs, then starts proxy + API + mobsf plugin. See
      # ci/steps/start-stack.sh's `mobsf)` arm.
      - name: Start proxy + API + MobSF plugin
        run: bash ci/steps/start-stack.sh mobsf
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_MOBSF: 'true'
          PLUGIN_API: 'true'
          MOBSF_URL: http://127.0.0.1:8000

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run security-infra suite (MobSF static scan)
        shell: bash
        run: bash ci/steps/run-suite.sh "@security-infra" mobsf security-infra
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: api
          DRIVER: api
          PLUGIN_MOBSF: 'true'
          MOBSF_URL: http://127.0.0.1:8000

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh mobsf

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}
          path: artifacts/mobsf/
          if-no-files-found: ignore
          retention-days: 30

      - name: Stop MobSF container
        if: always()
        run: docker rm -f mobsf 2>/dev/null || true

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job 6: Perf — Gatling Simulation
  # ---------------------------------------------------------------------------
  perf-gatling:
    name: Perf — Gatling ${{ inputs.perf_profile || 'smoke' }}
    needs: gate-gatling
    runs-on: ubuntu-latest
    env:
      TOOL_NAME: gatling
      PLATFORM: performance
      DRIVER: gatling
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-gatling-{3}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, inputs.perf_profile || 'smoke')
            || format('gh-{0}-{1}-gatling-{2}', github.run_id, github.run_attempt, inputs.perf_profile || 'smoke') }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Cache Gatling JRE bundle
        uses: actions/cache@v5
        with:
          path: node_modules/@gatling.io/cli/.gatling
          key: gatling-jre-${{ runner.os }}-${{ hashFiles('node_modules/@gatling.io/cli/package.json') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Start stack
        # Gatling has no proxy/plugin stack of its own — start-stack.sh's
        # `gatling)` arm is a documented no-op, kept only for Template Method
        # symmetry with the other jobs (see ci/steps/start-stack.sh).
        run: bash ci/steps/start-stack.sh gatling

      - name: Run simulation
        run: pnpm perf:${{ inputs.perf_profile || 'smoke' }}
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PERF_USERS: ${{ inputs.perf_users || '20' }}
          PERF_DURATION: ${{ inputs.perf_duration || '120' }}
          LANGUAGE: en

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh gatling

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ inputs.perf_profile || 'smoke' }}-${{ github.run_id }}
          path: artifacts/gatling/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Gatling HTML report (standard)
        if: ${{ always() && inputs.architecture_type != 'TOM' }}
        uses: actions/upload-artifact@v7
        with:
          name: gatling-report-${{ inputs.perf_profile || 'smoke' }}-${{ github.run_id }}
          path: target/gatling/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: WebdriverIO E2E (alternate web engine to Playwright — genuinely
  # independent, does not replace or share sessions with the playwright
  # plugin). Exercises the same `@desktop`-tagged feature files as e2e-web,
  # just routed through DRIVER=webdriverio instead of DRIVER=playwright.
  # Single browser (chromium) — docker-compose.yml's `webdriverio` profile
  # and .env.example both default BROWSER to chromium and there is no
  # per-browser Selenium service declared, so no browser matrix is invented
  # here that ci/pipeline.config.json doesn't also declare.
  # ---------------------------------------------------------------------------
  e2e-webdriverio:
    name: E2E — WebdriverIO ${{ matrix.suite }}
    needs: gate-webdriverio
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ matrix.suite == 'writes' && 'standard-user-writes' || format('webdriverio-reads-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    strategy:
      fail-fast: false
      matrix:
        suite: [reads, writes]
    env:
      TOOL_NAME: webdriverio
      PLATFORM: web
      VIEWPORT: desktop
      DRIVER: webdriverio
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-webdriverio-{3}', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt, matrix.suite)
            || format('gh-{0}-{1}-webdriverio-{2}', github.run_id, github.run_attempt, matrix.suite) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Brings up selenium-standalone (docker run -d, shm-size 2g, port
      # 4444) before proxy + webdriverio plugin + api plugin — see
      # ci/steps/start-stack.sh's `webdriverio)` arm.
      - name: Start proxy + plugins
        shell: bash
        run: bash ci/steps/start-stack.sh webdriverio
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: chromium
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: webdriverio
          PLUGIN_WEBDRIVERIO: 'true'
          PLUGIN_API: 'true'

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.suite }}" = "reads" ]; then
            TAG_EXPRESSION="@desktop and not @writes-shared-state"
          else
            TAG_EXPRESSION="@desktop and @writes-shared-state"
          fi
          bash ci/steps/run-suite.sh "$TAG_EXPRESSION" webdriverio ${{ matrix.suite }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BROWSER: chromium
          PLATFORM: web
          VIEWPORT: desktop
          DRIVER: webdriverio
          PROXY_ADDRESS: 127.0.0.1:50051

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Collect artifacts
        if: always()
        run: bash ci/steps/collect-artifacts.sh webdriverio

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ matrix.suite }}-${{ github.run_id }}
          path: artifacts/webdriverio/
          if-no-files-found: ignore
          retention-days: 30

      - name: Teardown
        if: always()
        run: bash ci/steps/teardown.sh

  # ---------------------------------------------------------------------------
  # Job: Cypress E2E — non-gRPC parallel track
  #
  # Cypress is not a gRPC plugin peer (Option A default): no port, no
  # start-stack.sh/run-suite.sh case arm, and it must NEVER call
  # ci/steps/collect-artifacts.sh — that script's non-TOM branch exits 1
  # when results/ is empty, and Cypress (running outside the chaos-proxy
  # entirely) never populates results/. So, unlike every other job in this
  # file, this job has no start-stack/collect-artifacts/teardown steps at
  # all — it runs `pnpm run test:cypress:desktop` directly and uploads
  # whatever Cypress itself writes to its own screenshots/videos folders
  # (src/plugins/cypress/cypress.config.ts pins screenshotsFolder/
  # videosFolder under its own directory).
  # ---------------------------------------------------------------------------
  e2e-cypress:
    name: E2E — Cypress Desktop
    needs: gate-cypress
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('cypress-{0}-{1}', github.run_id, github.run_attempt) }}
      cancel-in-progress: false
      queue: max
    env:
      TOOL_NAME: cypress
      PLATFORM: web
      TOM_RUN_ID: >-
        ${{ inputs.architecture_type == 'TOM'
            && format('tom-{0}-{1}-{2}-cypress', github.run_id, github.run_attempt, inputs.run_index || github.run_attempt)
            || format('gh-{0}-{1}-cypress', github.run_id, github.run_attempt) }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture run start time
        if: always()
        run: echo "RUN_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run Cypress suite
        run: pnpm run test:cypress:desktop
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Capture run end time
        if: always()
        run: echo "RUN_ENDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}-screenshots
          path: src/plugins/cypress/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ahm-artifacts-${{ github.job }}-${{ github.run_id }}-videos
          path: src/plugins/cypress/videos/
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 7: Consolidate — merge every per-tool TOM metrics artifact and run the
  # full operational + quality metrics pipeline over the combined inputs.
  # Copied from the now-folded-in tom-quantitative-execution.yml's own
  # `consolidate` job; only runs when architecture_type=TOM (the standard
  # path has no equivalent merge step — each job's own telemetry upload is
  # the final word there). `needs:` targets the shared job keys above rather
  # than TOM's original per-tool job names.
  #
  # NOT extended by this task: a11y-web, security-zap, security-mobsf,
  # e2e-mobilewright, e2e-webdriverio, e2e-cypress are absent from the
  # `needs:` list below, so their artifacts (and, for e2e-cypress, its
  # complete lack of a metrics/TOM upload — see that job's own header
  # comment) do not feed this consolidated run. Left as-is; out of this
  # task's scope to change.
  # ---------------------------------------------------------------------------
  consolidate:
    name: Consolidate — Experiment metrics
    needs:
      - api-smoke
      - e2e-web
      - e2e-web-responsive
      - visual-web
      - visual-web-responsive
      - e2e-android
      - e2e-ios
      - perf-gatling
    if: ${{ always() && inputs.architecture_type == 'TOM' }}
    runs-on: ubuntu-latest
    env:
      TOOL_NAME: ALL
      PLATFORM: ALL
      DRIVER: none
      TOM_RUN_ID: tom-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.run_index || github.run_attempt }}-consolidated

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all per-tool metrics artifacts
        if: always()
        # download-artifact bumped to v7 alongside upload-artifact (§3.6) —
        # the two actions ship in lockstep majors; this pairing could not be
        # re-verified against the live GitHub Marketplace listing from this
        # offline worktree, so double check before relying on it in prod.
        #
        # Pattern renamed from tom-metrics-* to ahm-artifacts-* (ci/steps
        # Task 2): every real job's TOM-mode upload is now the single
        # `Upload artifacts` step (name: ahm-artifacts-${{ github.job }}-...),
        # not a job-specific tom-metrics-* name. upload-artifact's `path:`
        # (artifacts/<profile>/) becomes each zip's root, so `merge-multiple:
        # true` + `path: .` still reconstructs ./metrics/, ./logs/, etc. at
        # the repo root the same way `pnpm run metrics:experiment` below
        # expects — collect-artifacts.sh's TOM branch just doesn't also copy
        # results/ into the mix (scoped to metrics/ only, per design §3.4).
        uses: actions/download-artifact@v7
        with:
          pattern: ahm-artifacts-*
          merge-multiple: true
          path: .

      - name: Run consolidated experiment metrics
        if: always()
        run: pnpm run metrics:experiment

      - name: Upload consolidated TOM metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tom-metrics-consolidated-${{ github.run_id }}
          path: |
            metrics/
          if-no-files-found: ignore
          retention-days: 30
