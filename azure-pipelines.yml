# =============================================================================
# AHM — Azure Pipelines equivalent of .github/workflows/ahm-execution-helix.yml
#
# This is a hand-authored, tool-agnostic-layer translation of the real,
# executed GitHub Actions workflow (`ahm-execution-helix.yml`) into Azure
# Pipelines YAML. It targets the same job inventory as `ci/pipeline.config.json`
# and calls the same shared `ci/steps/*.sh` scripts GHA already uses
# (setup-environment.sh -> start-stack.sh <profile> -> run-suite.sh <tags>
# <profile> [<suffix>] -> collect-artifacts.sh <profile> -> teardown.sh),
# NOT a re-implementation of GHA's own inline Node/pnpm marketplace actions.
#
# No real Azure DevOps organization/project exists for this repo yet — this
# file has been validated by parsing it with a generic YAML parser and by
# manual cross-reference against ci/pipeline.config.json and the reference
# workflow; it has NOT been validated with `az pipelines validate` or a real
# run. See .superpowers/sdd/task-4-report.md for the full validation writeup.
#
# --------------------------------------------------------------------------
# Deliberate scope decisions (documented, not silent):
#
# 1. TOM / architecture_type / experimentBatchId / runIndex / the
#    `consolidate` job are OUT of scope for this adapter — TOM is explicitly
#    a GHA-only reporting concern (see ground truth §7). Every job below
#    only implements the `standard` architecture_type path.
# 2. Trimmed relative to the reference workflow, since they are peripheral to
#    the actual job/profile/script/secret contract this task is graded
#    against (ground truth §11): MinIO telemetry-storage bring-up
#    (docker-compose minio, a GHA-inlined step, not one of the 5 shared
#    scripts), the `actions/cache@v5` pnpm-store cache step (
#    setup-environment.sh's own header comment explicitly says caching is
#    each adapter's own concern to add or skip), the RUN_STARTED_AT/
#    RUN_ENDED_AT timestamp bookkeeping steps, and the extra
#    `/tmp/ahm-ci-logs/` "service logs" artifact upload used by the
#    Playwright-family jobs in GHA. None of these are part of the 5-script
#    Template Method contract or the §10 artifacts contract this file is
#    checked against. Device/emulator/simulator bring-up (KVM, docker
#    android emulator, Appium server, iOS simulator boot, OmniPizza asset
#    download) is NOT trimmed — those are load-bearing, kept in full.
# 3. `e2e-mobilewright` (GHA: one job, `matrix: platform:[android,ios]`,
#    `runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}`)
#    has NO clean Azure equivalent: Azure's `strategy: matrix:` cannot vary a
#    job's `pool:`/`container:` per leg — all legs of one job share one pool
#    block, and pool selection is resolved before an agent (and therefore
#    any matrix-leg variable) exists. Splitting into 4 separate jobs
#    (`e2e_mobilewright_android_reads/_writes`, `e2e_mobilewright_ios_reads/
#    _writes`), each pinned to its own real pool, is the only way to make
#    this both valid Azure YAML and actually runnable. The writes-chain
#    still serializes both platform legs against each other (android leg
#    then ios leg), preserving the "one global writes queue" property the
#    ground truth's §4 chain design requires — it's just 2 chain links
#    instead of 1. Flagged as a concern in the task report.
# 4. Self-hosted pool name (`self-hosted-android-kvm`) below is a
#    placeholder — no such pool is provisioned. See the Docker/KVM/macOS
#    caveat block near the android jobs.
# =============================================================================

# Auto-triggers are currently commented out in the reference workflow too
# (manual dispatch only, while the job surface continues to evolve) — mirror
# that here rather than silently enabling CI on every push/PR.
trigger: none
pr: none

parameters:
  - name: platform
    type: string
    default: all
    values: [all, api, web, playwright, playwright-desktop, playwright-responsive, pixelmatch, pixelmatch-desktop, pixelmatch-responsive, mobile, android, ios, appium, appium-android, appium-ios, perf, gatling, mobilewright, security, a11y, cypress, webdriverio]
  - name: perfProfile
    type: string
    default: smoke
    values: [smoke, load, stress]
  - name: perfUsers
    type: string
    default: '20'
  - name: perfDuration
    type: string
    default: '120'
  - name: androidApiLevel
    type: string
    default: '33'
    values: ['28', '29', '30', '31', '32', '33']

variables:
  - group: ahm-secrets   # Azure DevOps Library group (Key Vault-backed or plain):
                          # API_BASE_URL, BASE_URL, GH_TOKEN. NOT MOBSF_API_KEY
                          # (ephemeral, scraped at runtime — see start-stack.sh's
                          # mobsf arm) and NOT IOS_APP_PATH (non-secret, below).
  - name: IOS_APP_PATH
    value: ''
  - name: NODE_VERSION
    value: '22.x'
  - name: PLAYWRIGHT_IMAGE
    value: 'mcr.microsoft.com/playwright:v1.61.1-jammy'

# Single stage containing every job (ground truth §6) — Azure's top-level
# `stages:` run sequentially by default, so one stage per job/profile (as the
# plan brief's illustrative Step 2 snippet shows) would silently serialize the
# whole pipeline and break the resolver's same-stage output-variable
# consumption. Per-job `condition:` is each job's own gate (mirroring the
# GitLab adapter's per-job `rules:` — no separate `gate-*` no-op jobs here
# either). `dependsOn` expresses the real ordering within this one stage.
stages:
  - stage: Helix
    displayName: 'AHM — Execution Helix'
    jobs:

      # -----------------------------------------------------------------
      # Resolver: latest OmniPizza release (ground truth §5)
      # Gated on platform being one of the mobile-ish values OR `security`
      # (security-mobsf needs the release too) — copied exactly from the
      # reference workflow's resolver job.
      # -----------------------------------------------------------------
      - job: resolve_omnipizza_release
        displayName: 'Resolve — OmniPizza latest release'
        pool: { vmImage: 'ubuntu-latest' }
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'mobile'), eq('${{ parameters.platform }}', 'android'), eq('${{ parameters.platform }}', 'ios'), eq('${{ parameters.platform }}', 'appium'), eq('${{ parameters.platform }}', 'appium-android'), eq('${{ parameters.platform }}', 'appium-ios'), eq('${{ parameters.platform }}', 'mobilewright'), eq('${{ parameters.platform }}', 'security'))"
        steps:
          - checkout: self
          - task: Bash@3
            name: fetch
            displayName: 'Fetch latest OmniPizza release tag'
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                TAG=$(curl -fsSL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/gsanchezm/OmniPizza/releases/latest" | jq -r .tag_name)
                if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
                  echo "Failed to resolve latest OmniPizza release tag."
                  exit 1
                fi
                BASE_URL="https://github.com/gsanchezm/OmniPizza/releases/download/${TAG}"
                echo "Resolved OmniPizza release: $TAG"
                echo "##vso[task.setvariable variable=tag;isOutput=true]$TAG"
                echo "##vso[task.setvariable variable=base_url;isOutput=true]$BASE_URL"
            env:
              GH_TOKEN: $(GH_TOKEN)

      # -----------------------------------------------------------------
      # Job: API (profile `api`) — split reads/writes (ground truth §4).
      # `_reads` runs independently; `_writes` is the first link in the
      # global standard-user-writes chain (no predecessor).
      # -----------------------------------------------------------------
      - job: api_reads
        displayName: 'E2E — API reads'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'api'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh api
            displayName: 'Start proxy + API plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@api and not @writes-shared-state" api reads
            displayName: 'Run Cucumber suite (API layer)'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
          - script: bash ci/steps/collect-artifacts.sh api
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/api
              artifact: ahm-artifacts-api-reads
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      - job: api_writes
        displayName: 'E2E — API writes'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'api'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh api
            displayName: 'Start proxy + API plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@api and @writes-shared-state" api writes
            displayName: 'Run Cucumber suite (API layer)'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
          - script: bash ci/steps/collect-artifacts.sh api
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/api
              artifact: ahm-artifacts-api-writes
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Playwright Desktop (profile `playwright-desktop`) — split
      # reads/writes; each keeps its own browser matrix. `_writes` uses
      # maxParallel: 1 (its 3 browser legs share the standard_user fixture
      # and must serialize against each other too) and is the second link
      # in the writes chain.
      # -----------------------------------------------------------------
      - job: e2e_web_reads
        displayName: 'E2E — Playwright Desktop reads ($(BROWSER))'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'web'), eq('${{ parameters.platform }}', 'playwright'), eq('${{ parameters.platform }}', 'playwright-desktop'), eq('${{ parameters.platform }}', 'pixelmatch'), eq('${{ parameters.platform }}', 'pixelmatch-desktop'))"
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
        strategy:
          matrix:
            chromium: { BROWSER: chromium }
            firefox: { BROWSER: firefox }
            webkit: { BROWSER: webkit }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh web
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              HEADLESS: 'true'
              PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
              API_ADAPTER_ADDRESS: 127.0.0.1:50055
              PLUGIN_PLAYWRIGHT: 'true'
              PLUGIN_PIXELMATCH: 'false'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@desktop and not @writes-shared-state" playwright-desktop $(BROWSER)
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              CUCUMBER_PARALLEL: '4'
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              PROXY_ADDRESS: 127.0.0.1:50051
              HEADLESS: 'true'
              PLUGIN_PIXELMATCH: 'false'
          - script: bash ci/steps/collect-artifacts.sh playwright-desktop
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/playwright-desktop
              artifact: ahm-artifacts-e2e-web-reads-$(BROWSER)
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      - job: e2e_web_writes
        displayName: 'E2E — Playwright Desktop writes ($(BROWSER))'
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'web'), eq('${{ parameters.platform }}', 'playwright'), eq('${{ parameters.platform }}', 'playwright-desktop'), eq('${{ parameters.platform }}', 'pixelmatch'), eq('${{ parameters.platform }}', 'pixelmatch-desktop')), in(dependencies.api_writes.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        dependsOn: api_writes
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
        strategy:
          matrix:
            chromium: { BROWSER: chromium }
            firefox: { BROWSER: firefox }
            webkit: { BROWSER: webkit }
          maxParallel: 1
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh web
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              HEADLESS: 'true'
              PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
              API_ADAPTER_ADDRESS: 127.0.0.1:50055
              PLUGIN_PLAYWRIGHT: 'true'
              PLUGIN_PIXELMATCH: 'false'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@desktop and @writes-shared-state" playwright-desktop $(BROWSER)
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              CUCUMBER_PARALLEL: '4'
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              PROXY_ADDRESS: 127.0.0.1:50051
              HEADLESS: 'true'
              PLUGIN_PIXELMATCH: 'false'
          - script: bash ci/steps/collect-artifacts.sh playwright-desktop
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/playwright-desktop
              artifact: ahm-artifacts-e2e-web-writes-$(BROWSER)
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Visual — Playwright Desktop / Pixelmatch (profile
      # `playwright-visual-desktop`). No matrix. Waits for BOTH e2e_web
      # legs (mirrors GHA's `needs: e2e-web`, which waits for the whole
      # matrixed job) and runs unless both are Skipped (ground truth §4).
      # Third link in the writes chain (it sits directly in the chain via
      # its dependsOn on e2e_web_writes, no separate chain-only edge
      # needed). Deviates from the vanilla 5-script sequence: runs
      # `pnpm test:json:visual:desktop` directly instead of run-suite.sh,
      # plus a `visual-gate.js` gate step (ground truth §3).
      # -----------------------------------------------------------------
      - job: visual_web
        displayName: 'Visual — Playwright Desktop (Pixelmatch)'
        dependsOn: [e2e_web_reads, e2e_web_writes]
        condition: "not(and(eq(dependencies.e2e_web_reads.result, 'Skipped'), eq(dependencies.e2e_web_writes.result, 'Skipped')))"
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh web
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              HEADLESS: 'true'
              PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
              PIXELMATCH_ADDRESS: 127.0.0.1:50056
              API_ADAPTER_ADDRESS: 127.0.0.1:50055
              PLUGIN_PLAYWRIGHT: 'true'
              PLUGIN_PIXELMATCH: 'true'
              PLUGIN_API: 'true'
          - script: pnpm test:json:visual:desktop
            displayName: 'Run visual capture'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: playwright
              PROXY_ADDRESS: 127.0.0.1:50051
              HEADLESS: 'true'
              PLUGIN_PIXELMATCH: 'true'
          - script: node scripts/visual-gate.js
            displayName: 'Visual gate — fail the job if any snapshot drifted'
            condition: succeededOrFailed()
          - script: bash ci/steps/collect-artifacts.sh playwright-visual-desktop
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/playwright-visual-desktop
              artifact: ahm-artifacts-visual-web
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Playwright Responsive (profile `playwright-responsive`) —
      # mirrors the Desktop job pair above. `_writes` is the fourth link
      # in the chain (depends on visual_web).
      # -----------------------------------------------------------------
      - job: e2e_web_responsive_reads
        displayName: 'E2E — Playwright Responsive reads ($(BROWSER))'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'web'), eq('${{ parameters.platform }}', 'playwright'), eq('${{ parameters.platform }}', 'playwright-responsive'), eq('${{ parameters.platform }}', 'pixelmatch'), eq('${{ parameters.platform }}', 'pixelmatch-responsive'))"
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
        strategy:
          matrix:
            chromium: { BROWSER: chromium }
            firefox: { BROWSER: firefox }
            webkit: { BROWSER: webkit }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh web
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              PLATFORM: web
              VIEWPORT: responsive
              DRIVER: playwright
              HEADLESS: 'true'
              PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
              API_ADAPTER_ADDRESS: 127.0.0.1:50055
              PLUGIN_PLAYWRIGHT: 'true'
              PLUGIN_PIXELMATCH: 'false'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@responsive and not @writes-shared-state" playwright-responsive $(BROWSER)
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              CUCUMBER_PARALLEL: '4'
              PLATFORM: web
              VIEWPORT: responsive
              DRIVER: playwright
              PROXY_ADDRESS: 127.0.0.1:50051
              HEADLESS: 'true'
              PLUGIN_PIXELMATCH: 'false'
          - script: bash ci/steps/collect-artifacts.sh playwright-responsive
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/playwright-responsive
              artifact: ahm-artifacts-e2e-web-responsive-reads-$(BROWSER)
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      - job: e2e_web_responsive_writes
        displayName: 'E2E — Playwright Responsive writes ($(BROWSER))'
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'web'), eq('${{ parameters.platform }}', 'playwright'), eq('${{ parameters.platform }}', 'playwright-responsive'), eq('${{ parameters.platform }}', 'pixelmatch'), eq('${{ parameters.platform }}', 'pixelmatch-responsive')), in(dependencies.visual_web.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        dependsOn: visual_web
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
        strategy:
          matrix:
            chromium: { BROWSER: chromium }
            firefox: { BROWSER: firefox }
            webkit: { BROWSER: webkit }
          maxParallel: 1
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh web
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              PLATFORM: web
              VIEWPORT: responsive
              DRIVER: playwright
              HEADLESS: 'true'
              PLAYWRIGHT_ADDRESS: 127.0.0.1:50052
              API_ADAPTER_ADDRESS: 127.0.0.1:50055
              PLUGIN_PLAYWRIGHT: 'true'
              PLUGIN_PIXELMATCH: 'false'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@responsive and @writes-shared-state" playwright-responsive $(BROWSER)
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: $(BROWSER)
              CUCUMBER_PARALLEL: '4'
              PLATFORM: web
              VIEWPORT: responsive
              DRIVER: playwright
              PROXY_ADDRESS: 127.0.0.1:50051
              HEADLESS: 'true'
              PLUGIN_PIXELMATCH: 'false'
          - script: bash ci/steps/collect-artifacts.sh playwright-responsive
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/playwright-responsive
              artifact: ahm-artifacts-e2e-web-responsive-writes-$(BROWSER)
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Visual — Playwright Responsive / Pixelmatch (profile
      # `playwright-visual-responsive`). Mirrors visual_web. Fifth link
      # in the writes chain (via dependsOn on e2e_web_responsive_writes).
      # -----------------------------------------------------------------
      - job: visual_web_responsive
        displayName: 'Visual — Playwright Responsive (Pixelmatch)'
        dependsOn: [e2e_web_responsive_reads, e2e_web_responsive_writes]
        condition: "not(and(eq(dependencies.e2e_web_responsive_reads.result, 'Skipped'), eq(dependencies.e2e_web_responsive_writes.result, 'Skipped')))"
        pool: { vmImage: 'ubuntu-latest' }
        container:
          image: mcr.microsoft.com/playwright:v1.61.1-jammy
          options: --user 0
