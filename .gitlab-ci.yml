# =============================================================================
# Job: Security — ZAP  (profile: zap)
# No @mobsf/@zap tag exists — @security is the hard-gating active-scan
# suite; @security-infra (ZAP baseline+TLS+MobSF) runs from both this job
# and security-mobsf below, split by which plugin is live in each — do not
# "fix" this back to a nonexistent @mobsf tag (see ci/pipeline.config.json's
# own note on the zap profile).
# =============================================================================
security-zap:
  extends: .docker-in-docker
  rules: *rules-security
  variables:
    TOOL_NAME: zap
    PLATFORM: api
    DRIVER: api
    PLUGIN_ZAP: 'true'
    PLUGIN_API: 'true'
  script:
    - bash ci/steps/setup-environment.sh
    - bash ci/steps/start-stack.sh zap
    # Both suites must run regardless of the first's outcome — mirrors GH's
    # `if: success() || failure()` on the security-infra step. A plain
    # `script:` list aborts at the first failing line (GitLab's default is
    # "stop on first error", same as GH's implicit `if: success()` between
    # steps), so both suites are run inside one block with `set +e` to
    # capture each exit code independently, then the job is failed
    # afterward if EITHER suite failed — same net effect as GH (a step
    # with `if: success() || failure()` that itself fails still fails the
    # job; it just isn't skipped by the earlier step's failure).
    - |
      set +e
      bash ci/steps/run-suite.sh "@security" zap security
      SECURITY_EXIT=$?
      bash ci/steps/run-suite.sh "@security-infra" zap security-infra
      INFRA_EXIT=$?
      set -e
      if [ "$SECURITY_EXIT" -ne 0 ] || [ "$INFRA_EXIT" -ne 0 ]; then
        echo "security(exit=$SECURITY_EXIT) / security-infra(exit=$INFRA_EXIT) — failing job"
        exit 1
      fi
  after_script:
    - bash ci/steps/collect-artifacts.sh zap || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/zap/**

# =============================================================================
# Job: Security — MobSF  (profile: mobsf)
# Downloads both platform binaries fresh every run (no caching), matching
# support.security.json's mobile.mobsf[] filePath entries exactly. Runs on
# ubuntu — MobSF only reads the static .app bundle, no simulator needed.
# =============================================================================
security-mobsf:
  extends: .docker-in-docker
  rules: *rules-security
  needs:
    - resolve-omnipizza-release
  variables:
    TOOL_NAME: mobsf
    PLATFORM: api
    DRIVER: api
    PLUGIN_MOBSF: 'true'
    PLUGIN_API: 'true'
    MOBSF_URL: http://127.0.0.1:8000
  script:
    - bash ci/steps/setup-environment.sh
    - |
      mkdir -p assets/apps/android
      curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" -o assets/apps/android/omnipizza-release.apk
    - |
      mkdir -p assets/apps/ios
      curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" -o assets/apps/ios/OmniPizza-Simulator.zip
      rm -rf assets/apps/ios/unpacked assets/apps/ios/OmniPizza.app
      mkdir -p assets/apps/ios/unpacked
      unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
      APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
      if [ -z "$APP_PATH" ]; then echo "No .app bundle found"; exit 1; fi
      cp -R "$APP_PATH" assets/apps/ios/OmniPizza.app
    - bash ci/steps/start-stack.sh mobsf
    - bash ci/steps/run-suite.sh "@security-infra" mobsf security-infra
  after_script:
    - bash ci/steps/collect-artifacts.sh mobsf || true
    - docker rm -f mobsf 2>/dev/null || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/mobsf/**

# =============================================================================
# Job: Perf — Gatling  (profile: gatling)
# start-stack.sh's `gatling` arm is a documented no-op — kept for Template
# Method symmetry with every other job. Runs `pnpm perf:<profile>` directly,
# not run-suite.sh (Gatling has no cucumber/gRPC plugin stack).
# =============================================================================
perf-gatling:
  extends: .node-base
  rules: *rules-gatling
  cache:
    - key:
        files:
          - pnpm-lock.yaml
      paths:
        - .pnpm-store
    - key: gatling-jre-$CI_JOB_IMAGE
      paths:
        - node_modules/@gatling.io/cli/.gatling
  variables:
    TOOL_NAME: gatling
    PLATFORM: performance
    DRIVER: gatling
    LANGUAGE: en
  script:
    - bash ci/steps/setup-environment.sh
    - bash ci/steps/start-stack.sh gatling
    - pnpm perf:${PERF_PROFILE:-smoke}
  after_script:
    - bash ci/steps/collect-artifacts.sh gatling || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/gatling/**
      - target/gatling/

# =============================================================================
# Job: WebdriverIO E2E  (profile: webdriverio)
# Alternate web engine to Playwright — genuinely independent, no shared
# session. Single browser (chromium) — no per-browser Selenium service is
# declared in docker-compose.yml, so no browser matrix is invented here.
# =============================================================================
.e2e-webdriverio-base:
  extends: .docker-in-docker
  rules: *rules-webdriverio
  variables:
    TOOL_NAME: webdriverio
    PLATFORM: web
    VIEWPORT: desktop
    DRIVER: webdriverio
    BROWSER: chromium
    PROXY_ADDRESS: 127.0.0.1:50051
    PLUGIN_WEBDRIVERIO: 'true'
    PLUGIN_API: 'true'
  script:
    - bash ci/steps/setup-environment.sh
    - bash ci/steps/start-stack.sh webdriverio
    - |
      if [ "$SUITE" = "reads" ]; then
        TAG_EXPRESSION="@desktop and not @writes-shared-state"
      else
        TAG_EXPRESSION="@desktop and @writes-shared-state"
      fi
      bash ci/steps/run-suite.sh "$TAG_EXPRESSION" webdriverio "$SUITE"
  after_script:
    - bash ci/steps/collect-artifacts.sh webdriverio || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/webdriverio/**

e2e-webdriverio-reads:
  extends: .e2e-webdriverio-base
  variables:
    SUITE: reads

e2e-webdriverio-writes:
  extends: .e2e-webdriverio-base
  resource_group: standard_user_writes
  variables:
    SUITE: writes

# =============================================================================
# Job: Cypress E2E  (profile: cypress)
# Not a gRPC plugin peer — no start-stack.sh/run-suite.sh/collect-
# artifacts.sh call at all (collect-artifacts.sh's non-TOM branch exits 1 on
# an empty results/, which Cypress never populates). Runs entirely outside
# the chaos-proxy; uploads its own screenshots/videos folders directly.
# =============================================================================
e2e-cypress:
  extends: .node-base
  rules: *rules-cypress
  variables:
    TOOL_NAME: cypress
    PLATFORM: web
  script:
    - bash ci/steps/setup-environment.sh
    - pnpm run test:cypress:desktop
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - src/plugins/cypress/screenshots/
      - src/plugins/cypress/videos/

# =============================================================================
# Job: Consolidate — Experiment metrics (TOM only)
#
# Every `needs:` entry is `optional: true` because, unlike this job's own
# rules (ARCHITECTURE_TYPE only, no TARGET_PLATFORM restriction — mirrors
# GH's `if: always() && inputs.architecture_type == 'TOM'`), a narrower
# TARGET_PLATFORM dispatch value legitimately excludes most of these jobs
# from the pipeline entirely, not just from having run.
#
# JUDGMENT CALL — path flattening: GH's `actions/upload-artifact` with
# `path: artifacts/<profile>/` uploads that directory's *contents* as the
# archive root, so `download-artifact` + `path: .` reconstructs bare
# `metrics/`, `logs/`, etc. at the repo root. GitLab job artifacts instead
# always preserve the original project-relative path
# (`artifacts/<profile>/metrics/...`), so `needs:` alone would leave every
# job's metrics nested under its own profile folder instead of merged. The
# loop below reproduces GH's flattening explicitly before calling
# `metrics:experiment`, which expects the flat layout.
# =============================================================================
consolidate:
  extends: .node-base
  rules:
    - if: '$ARCHITECTURE_TYPE == "TOM"'
      when: always
  needs:
    - job: api-smoke-reads
      optional: true
    - job: api-smoke-writes
      optional: true
    - job: e2e-web-reads
      optional: true
    - job: e2e-web-writes
      optional: true
    - job: e2e-web-responsive-reads
      optional: true
    - job: e2e-web-responsive-writes
      optional: true
    - job: visual-web
      optional: true
    - job: visual-web-responsive
      optional: true
    - job: e2e-android-reads
      optional: true
    - job: e2e-android-writes
      optional: true
    - job: e2e-ios-reads
      optional: true
    - job: e2e-ios-writes
      optional: true
    - job: perf-gatling
      optional: true
  variables:
    TOOL_NAME: ALL
    PLATFORM: ALL
    DRIVER: none
  script:
    - bash ci/steps/setup-environment.sh
    - |
      mkdir -p metrics logs
      for d in artifacts/*/metrics; do
        [ -d "$d" ] && cp -rf "$d"/. metrics/ 2>/dev/null || true
      done
      for d in artifacts/*/logs; do
        [ -d "$d" ] && cp -rf "$d"/. logs/ 2>/dev/null || true
      done
    - pnpm run metrics:experiment
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - metrics/
