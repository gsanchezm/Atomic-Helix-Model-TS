# =============================================================================
# Job: Android E2E  (profile: android)
#
# JUDGMENT CALL — KVM: `--privileged --device /dev/kvm` (hardware
# acceleration for the docker-android emulator) needs a self-hosted GitLab
# Runner whose host actually exposes /dev/kvm AND whose executor is
# configured to pass it through (this is not something a generic GitLab.com
# shared runner supports, unlike GH's ubuntu-latest + the udev-rule trick
# below, which assumes real KVM hardware already present on the runner).
# `tags: [kvm]` is a placeholder — replace with whatever tag your
# self-hosted runner registers.
# =============================================================================
.e2e-android-base:
  extends: .docker-in-docker
  rules: *rules-android
  needs:
    - resolve-omnipizza-release
  tags:
    - kvm
  variables:
    TOOL_NAME: appium-android
    PLATFORM: android
    DRIVER: appium
    CAP_PROFILE: docker_android
    ANDROID_APP_PATH: assets/apps/android/app-release.apk
    ANDROID_UDID: 'localhost:5555'
    APPIUM_HOST: localhost
    APPIUM_PORT: '4723'
    MINIO_ENDPOINT: localhost
    MINIO_PORT: '9000'
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    PLUGIN_APPIUM: 'true'
    PLUGIN_API: 'true'
  script:
    - bash ci/steps/setup-environment.sh
    - |
      echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
        > /etc/udev/rules.d/99-kvm4all.rules 2>/dev/null || true
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends android-sdk-platform-tools && rm -rf /var/lib/apt/lists/*
    - |
      mkdir -p assets/apps/android
      curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" -o assets/apps/android/app-release.apk
      ls -lh assets/apps/android/app-release.apk
    - docker compose -f infrastructure/minio-compose.yml up -d && sleep 5
    - |
      docker run -d --name android-emulator --privileged --device /dev/kvm \
        -p 5554:5554 -p 5555:5555 \
        -e API_LEVEL="${ANDROID_API_LEVEL:-33}" -e IMG_TYPE=google_apis -e ARCHITECTURE=x86_64 \
        -e DEVICE_ID=pixel -e MEMORY=4096 -e CORES=2 -e DISABLE_ANIMATION=true \
        -e DISABLE_HIDDEN_POLICY=true -e SKIP_AUTH=1 \
        halimqarroum/docker-android:api-${ANDROID_API_LEVEL:-33}
    - |
      pnpm exec appium --relaxed-security &
      sleep 5
    - |
      adb connect localhost:5555
      for i in $(seq 1 40); do
        if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
          echo "Emulator ready after $((i * 15))s"; break
        fi
        echo "  Attempt $i/40 — waiting 15s..."; sleep 15
      done
      adb devices
    - bash ci/steps/start-stack.sh android
    - |
      if [ "$SUITE" = "reads" ]; then
        TAG_EXPRESSION="@android and not @writes-shared-state"
      else
        TAG_EXPRESSION="@android and @writes-shared-state"
      fi
      bash ci/steps/run-suite.sh "$TAG_EXPRESSION" android "$SUITE"
  after_script:
    - '[ "$CI_JOB_STATUS" = "failed" ] && docker logs --tail 200 android-emulator 2>&1 || true'
    - bash ci/steps/collect-artifacts.sh android || true
    - docker rm -f android-emulator || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/android/**

e2e-android-reads:
  extends: .e2e-android-base
  variables:
    SUITE: reads

e2e-android-writes:
  extends: .e2e-android-base
  resource_group: standard_user_writes
  variables:
    SUITE: writes

# =============================================================================
# Job: iOS E2E  (profile: ios)
#
# JUDGMENT CALL — macOS runner: `tags: [saas-macos-medium-m1]` is GitLab.com's
# documented shared macOS runner tag (requires GitLab Premium/Ultimate, or
# swap for a self-hosted macOS runner's own tag). xcrun/simctl only exist on
# a real macOS host — there is no containerized equivalent.
# =============================================================================
.e2e-ios-base:
  extends: .node-base
  rules: *rules-ios
  needs:
    - resolve-omnipizza-release
  tags:
    - saas-macos-medium-m1
  variables:
    TOOL_NAME: appium-ios
    PLATFORM: ios
    DRIVER: appium
    CAP_PROFILE: ci_ios_headless
    APPIUM_HOST: localhost
    APPIUM_PORT: '4723'
    MINIO_ENDPOINT: localhost
    MINIO_PORT: '9000'
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    PLUGIN_APPIUM: 'true'
    PLUGIN_API: 'true'
  script:
    - bash ci/steps/setup-environment.sh
    - |
      mkdir -p assets/apps/ios
      curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" -o assets/apps/ios/OmniPizza-Simulator.zip
    - |
      rm -rf assets/apps/ios/unpacked
      mkdir -p assets/apps/ios/unpacked
      unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
      # Honor a pre-set IOS_APP_PATH CI/CD variable (mirrors GH's
      # `vars.IOS_APP_PATH || env.IOS_APP_PATH`) — only auto-discover when
      # the operator hasn't overridden it (ci/pipeline.config.json's `ios`
      # profile lists IOS_APP_PATH as an optional requiredVars entry).
      if [ -z "${IOS_APP_PATH:-}" ]; then
        IOS_APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
        if [ -z "$IOS_APP_PATH" ]; then echo "No .app bundle found"; exit 1; fi
      fi
      export IOS_APP_PATH
      echo "IOS_APP_PATH=$IOS_APP_PATH" >> ios.env
    - |
      DEVICE_LINE=$(xcrun simctl list devices available | grep -E 'iPhone .*\([A-F0-9-]+\) \((Shutdown|Booted)\)' | head -n 1)
      if [ -z "$DEVICE_LINE" ]; then echo "No available iPhone simulator found"; exit 1; fi
      IOS_DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^[[:space:]]*([^()]+)[[:space:]]+\(.*/\1/' | xargs)
      IOS_UDID=$(echo "$DEVICE_LINE" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
      xcrun simctl boot "$IOS_UDID" || true
      xcrun simctl bootstatus "$IOS_UDID" -b
      echo "IOS_DEVICE_NAME=$IOS_DEVICE_NAME" >> ios.env
      echo "IOS_UDID=$IOS_UDID" >> ios.env
    # `set -a` (allexport) so IOS_APP_PATH/IOS_UDID/IOS_DEVICE_NAME actually
    # get exported into the environment — plain `source ios.env` only sets
    # them as local shell variables in THIS script's shell session; they
    # would never reach `bash ci/steps/start-stack.sh ios` (a child
    # process, which only inherits exported vars) or the appium/
    # mobilewright plugin process it spawns. Without this, IOS_UDID/
    # IOS_DEVICE_NAME reach the plugin as empty strings.
    - |
      set -a
      source ios.env
      set +a
    - |
      MACHINE_ARCH=$(uname -m)
      MINIO_ARCH=$(node -p "({ arm64: 'arm64', x86_64: 'amd64' })[process.argv[1]] || ''" "$MACHINE_ARCH")
      curl -fL "https://dl.min.io/server/minio/release/darwin-${MINIO_ARCH}/minio" -o /tmp/minio
      chmod +x /tmp/minio
      mkdir -p /tmp/ahm-minio-data
      MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin \
        /tmp/minio server /tmp/ahm-minio-data --address ":9000" --console-address ":9001" &
      for i in $(seq 1 30); do
        curl -fsS http://localhost:9000/minio/health/live >/dev/null && { echo "MinIO ready"; break; }
        sleep 1
      done
    - |
      pnpm exec appium --relaxed-security &
      sleep 5
    - bash ci/steps/start-stack.sh ios
    - |
      if [ "$SUITE" = "reads" ]; then
        TAG_EXPRESSION="@ios and not @writes-shared-state"
      else
        TAG_EXPRESSION="@ios and @writes-shared-state"
      fi
      bash ci/steps/run-suite.sh "$TAG_EXPRESSION" ios "$SUITE"
  after_script:
    - bash ci/steps/collect-artifacts.sh ios || true
    - bash ci/steps/teardown.sh || true
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/ios/**

e2e-ios-reads:
  extends: .e2e-ios-base
  variables:
    SUITE: reads

e2e-ios-writes:
  extends: .e2e-ios-base
  resource_group: standard_user_writes
  variables:
    SUITE: writes

