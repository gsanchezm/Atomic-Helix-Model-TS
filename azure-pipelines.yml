          - script: |
              export IOS_APP_PATH="${IOS_APP_PATH:-$DISCOVERED_IOS_APP_PATH}"
              bash ci/steps/run-suite.sh "@ios and @writes-shared-state" ios writes
            displayName: 'Run E2E tests'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: ios
              DRIVER: appium
              APPIUM_HOST: localhost
              APPIUM_PORT: '4723'
              CAP_PROFILE: ci_ios_headless
              IOS_APP_PATH: $(IOS_APP_PATH)
              DISCOVERED_IOS_APP_PATH: $(DISCOVERED_IOS_APP_PATH)
              IOS_UDID: $(IOS_UDID)
              IOS_DEVICE_NAME: $(IOS_DEVICE_NAME)
