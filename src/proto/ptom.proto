syntax = "proto3";

package ptom;

// --- Core Service (used by clientâ†’proxy and proxyâ†’plugin) ---

service ActionService {
  rpc ExecuteIntent (IntentRequest) returns (IntentResponse);
  rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message IntentRequest {
  string actionId = 1;
  string targetSelector = 2;
  string platform = 3;
  // Deprecated. Kept at field 4 for wire compatibility; absolute timestamps
  // cannot produce reliable latency metrics across machines with clock drift.
  double clientSentAt = 4;
}

message IntentResponse {
  string status = 1;
  string payload = 2;
  string errorMessage = 3;
  // Time spent inside the receiving service, measured with its monotonic clock.
  // The caller subtracts this duration from its own RTT to estimate transport cost.
  double serverDurationMs = 4;
}

// --- Health Check ---

message HealthRequest {}

message HealthResponse {
  string pluginName = 1;
  string status = 2;
}

// --- Plugin Registry (dynamic discovery) ---

service PluginRegistry {
  rpc Register (PluginInfo) returns (RegistrationAck);
  rpc ListPlugins (Empty) returns (PluginList);
}

message Empty {}

message PluginInfo {
  string name = 1;
  string address = 2;
  repeated string capabilities = 3;
}

message RegistrationAck {
  bool accepted = 1;
  string message = 2;
}

message PluginList {
  repeated PluginInfo plugins = 1;
}
