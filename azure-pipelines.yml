      # -----------------------------------------------------------------
      # Job: iOS (profile `ios`) — split reads/writes. Uses Azure's
      # Microsoft-hosted `macOS-latest` pool directly — the one leg that
      # is NOT a gap versus GHA (ground truth §9). `_writes` is the
      # seventh link in the writes chain.
      # -----------------------------------------------------------------
      - job: e2e_ios_reads
        displayName: 'E2E — Appium iOS reads'
        dependsOn: resolve_omnipizza_release
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'mobile'), eq('${{ parameters.platform }}', 'ios'), eq('${{ parameters.platform }}', 'appium'), eq('${{ parameters.platform }}', 'appium-ios')), in(dependencies.resolve_omnipizza_release.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        pool: { vmImage: 'macOS-latest' }
        variables:
          OMNIPIZZA_RELEASE_TAG: $[ dependencies.resolve_omnipizza_release.outputs['fetch.tag'] ]
          OMNIPIZZA_RELEASE_BASE_URL: $[ dependencies.resolve_omnipizza_release.outputs['fetch.base_url'] ]
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: |
              mkdir -p assets/apps/ios
              echo "Downloading OmniPizza iOS simulator bundle from release $OMNIPIZZA_RELEASE_TAG"
              curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
                -o assets/apps/ios/OmniPizza-Simulator.zip
              ls -lh assets/apps/ios/OmniPizza-Simulator.zip
            displayName: 'Download iOS simulator artifact'
          - script: |
              rm -rf assets/apps/ios/unpacked
              mkdir -p assets/apps/ios/unpacked
              unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
              DISCOVERED_IOS_APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
              if [ -z "$DISCOVERED_IOS_APP_PATH" ]; then
                echo "No .app bundle found inside OmniPizza-Simulator.zip"
                exit 1
              fi
              echo "##vso[task.setvariable variable=DISCOVERED_IOS_APP_PATH]$DISCOVERED_IOS_APP_PATH"
            displayName: 'Unpack iOS simulator app'
          - script: |
              DEVICE_LINE=$(xcrun simctl list devices available | grep -E 'iPhone .*\([A-F0-9-]+\) \((Shutdown|Booted)\)' | head -n 1)
              if [ -z "$DEVICE_LINE" ]; then
                echo "No available iPhone simulator found"
                exit 1
              fi
              IOS_DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -E 's/^[[:space:]]*([^()]+)[[:space:]]+\(.*/\1/' | xargs)
              IOS_UDID=$(echo "$DEVICE_LINE" | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
              echo "##vso[task.setvariable variable=IOS_DEVICE_NAME]$IOS_DEVICE_NAME"
              echo "##vso[task.setvariable variable=IOS_UDID]$IOS_UDID"
              xcrun simctl boot "$IOS_UDID" || true
              xcrun simctl bootstatus "$IOS_UDID" -b
            displayName: 'Select and boot iOS simulator'
          - script: |
              pnpm exec appium --relaxed-security &
              sleep 5
            displayName: 'Start Appium server'
          - script: |
              export IOS_APP_PATH="${IOS_APP_PATH:-$DISCOVERED_IOS_APP_PATH}"
              bash ci/steps/start-stack.sh ios
            displayName: 'Start proxy + Appium plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: ios
              DRIVER: appium
              APPIUM_HOST: localhost
              APPIUM_PORT: '4723'
              CAP_PROFILE: ci_ios_headless
              IOS_APP_PATH: $(IOS_APP_PATH)
              DISCOVERED_IOS_APP_PATH: $(DISCOVERED_IOS_APP_PATH)
              IOS_UDID: $(IOS_UDID)
              IOS_DEVICE_NAME: $(IOS_DEVICE_NAME)
              PLUGIN_APPIUM: 'true'
