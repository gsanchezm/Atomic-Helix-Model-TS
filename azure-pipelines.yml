            condition: always()

      # -----------------------------------------------------------------
      # Job: Security — MobSF (profile `mobsf`, independent, not in the
      # writes chain, but depends on the resolver for both platform
      # binaries). Downloads Android APK + iOS .app fresh every run (no
      # caching) so support.security.json's mobile.mobsf[] filePath
      # entries resolve to real files. `start-stack.sh mobsf` itself
      # brings up the pinned MobSF container, health-polls it, and
      # scrapes MOBSF_API_KEY from `docker logs mobsf` — NOT
      # reimplemented here (ground truth §3/§8). Only ONE run-suite.sh
      # call (`@security-infra`, no `@security` call — that only happens
      # in security_zap).
      # -----------------------------------------------------------------
      - job: security_mobsf
        displayName: 'Security — MobSF'
        dependsOn: resolve_omnipizza_release
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'security')), in(dependencies.resolve_omnipizza_release.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        pool: { vmImage: 'ubuntu-latest' }
        variables:
          OMNIPIZZA_RELEASE_TAG: $[ dependencies.resolve_omnipizza_release.outputs['fetch.tag'] ]
          OMNIPIZZA_RELEASE_BASE_URL: $[ dependencies.resolve_omnipizza_release.outputs['fetch.base_url'] ]
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          # filePath must match support.security.json's mobile.mobsf[] entries
          # exactly: "assets/apps/android/omnipizza-release.apk" — NOT renamed
          # to app-release.apk the way e2e-android's own copy is.
          - script: |
              mkdir -p assets/apps/android
              echo "Downloading OmniPizza Android APK from release $OMNIPIZZA_RELEASE_TAG"
              curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
                -o assets/apps/android/omnipizza-release.apk
              ls -lh assets/apps/android/omnipizza-release.apk
            displayName: 'Download Android APK for MobSF scan'
          # support.security.json's ios mobsf entry expects a literal .app
          # DIRECTORY at "assets/apps/ios/OmniPizza.app" — no booted
          # simulator or macOS runner needed, MobSF only reads the static
          # bundle on disk.
          - script: |
              mkdir -p assets/apps/ios
              echo "Downloading OmniPizza iOS simulator bundle from release $OMNIPIZZA_RELEASE_TAG"
              curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/OmniPizza-Simulator.zip" \
                -o assets/apps/ios/OmniPizza-Simulator.zip
              rm -rf assets/apps/ios/unpacked assets/apps/ios/OmniPizza.app
              mkdir -p assets/apps/ios/unpacked
              unzip -q assets/apps/ios/OmniPizza-Simulator.zip -d assets/apps/ios/unpacked
              APP_PATH=$(find assets/apps/ios/unpacked -maxdepth 3 -name '*.app' -type d | head -n 1)
              if [ -z "$APP_PATH" ]; then
                echo "No .app bundle found inside OmniPizza-Simulator.zip"
                exit 1
              fi
              cp -R "$APP_PATH" assets/apps/ios/OmniPizza.app
              ls -ld assets/apps/ios/OmniPizza.app
            displayName: 'Download + unpack iOS app for MobSF scan'
          - script: bash ci/steps/start-stack.sh mobsf
            displayName: 'Start proxy + API + MobSF plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_MOBSF: 'true'
              PLUGIN_API: 'true'
              MOBSF_URL: http://127.0.0.1:8000
          - script: bash ci/steps/run-suite.sh "@security-infra" mobsf security-infra
            displayName: 'Run security-infra suite (MobSF static scan)'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_MOBSF: 'true'
              MOBSF_URL: http://127.0.0.1:8000
          - script: bash ci/steps/collect-artifacts.sh mobsf
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/mobsf
              artifact: ahm-artifacts-security-mobsf
          - script: docker rm -f mobsf 2>/dev/null || true
            displayName: 'Stop MobSF container'
            condition: always()
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Perf — Gatling (profile `gatling`, independent). Deviates
      # from the vanilla sequence: `start-stack.sh gatling` is a
      # documented no-op (kept for Template Method symmetry), the actual
      # simulation runs via `pnpm perf:<profile>` directly, NOT run-suite.sh.
      # -----------------------------------------------------------------
      - job: perf_gatling
        displayName: 'Perf — Gatling ${{ parameters.perfProfile }}'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'perf'), eq('${{ parameters.platform }}', 'gatling'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh gatling
            displayName: 'Start stack (documented no-op, kept for Template Method symmetry)'
          - script: pnpm perf:${{ parameters.perfProfile }}
            displayName: 'Run simulation'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PERF_USERS: ${{ parameters.perfUsers }}
              PERF_DURATION: ${{ parameters.perfDuration }}
              LANGUAGE: en
          - script: bash ci/steps/collect-artifacts.sh gatling
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/gatling
              artifact: ahm-artifacts-perf-gatling-${{ parameters.perfProfile }}
          - task: PublishPipelineArtifact@1
            displayName: 'Upload Gatling HTML report'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: target/gatling
              artifact: gatling-report-${{ parameters.perfProfile }}
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: WebdriverIO (profile `webdriverio`) — split reads/writes.
      # Single browser (chromium) — no browser matrix, matching
      # ci/pipeline.config.json's matrix declaration for this profile.
      # `_writes` is the ninth (final) link in the writes chain.
      # start-stack.sh's `webdriverio` arm brings up its own
      # selenium/standalone-chrome container via `docker run -d` — NOT
      # the job's own Azure `container:` field (ground truth §2).
      # -----------------------------------------------------------------
      - job: e2e_webdriverio_reads
        displayName: 'E2E — WebdriverIO reads'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'webdriverio'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh webdriverio
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: chromium
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: webdriverio
              PLUGIN_WEBDRIVERIO: 'true'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@desktop and not @writes-shared-state" webdriverio reads
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: chromium
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: webdriverio
              PROXY_ADDRESS: 127.0.0.1:50051
          - script: bash ci/steps/collect-artifacts.sh webdriverio
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/webdriverio
              artifact: ahm-artifacts-e2e-webdriverio-reads
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      - job: e2e_webdriverio_writes
        displayName: 'E2E — WebdriverIO writes'
        dependsOn: e2e_mobilewright_ios_writes
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'webdriverio')), in(dependencies.e2e_mobilewright_ios_writes.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: bash ci/steps/start-stack.sh webdriverio
            displayName: 'Start proxy + plugins'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: chromium
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: webdriverio
              PLUGIN_WEBDRIVERIO: 'true'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@desktop and @writes-shared-state" webdriverio writes
            displayName: 'Run E2E tests'
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              BROWSER: chromium
              PLATFORM: web
              VIEWPORT: desktop
              DRIVER: webdriverio
              PROXY_ADDRESS: 127.0.0.1:50051
          - script: bash ci/steps/collect-artifacts.sh webdriverio
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/webdriverio
              artifact: ahm-artifacts-e2e-webdriverio-writes
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

      # -----------------------------------------------------------------
      # Job: Cypress (profile `cypress`, independent). NOT a gRPC plugin
      # peer — calls NONE of the 5 shared scripts except
      # setup-environment.sh (needs pnpm/node_modules present). Runs
      # `pnpm run test:cypress:desktop` directly and uploads Cypress's
      # own screenshots/videos folders instead of calling
      # collect-artifacts.sh (whose non-TOM branch exits 1 on an empty
      # results/, which Cypress never populates) — ground truth §3.
      # -----------------------------------------------------------------
      - job: e2e_cypress
        displayName: 'E2E — Cypress Desktop'
        condition: "or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'cypress'))"
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: pnpm run test:cypress:desktop
            displayName: 'Run Cypress suite'
            env:
              BASE_URL: $(BASE_URL)
          - task: PublishPipelineArtifact@1
            displayName: 'Upload Cypress screenshots'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: src/plugins/cypress/screenshots
              artifact: ahm-artifacts-e2e-cypress-screenshots
          - task: PublishPipelineArtifact@1
            displayName: 'Upload Cypress videos'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: src/plugins/cypress/videos
              artifact: ahm-artifacts-e2e-cypress-videos
