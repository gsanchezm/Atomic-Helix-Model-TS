      # -----------------------------------------------------------------
      # Docker/KVM/macOS caveat (ground truth §9, plan brief Step 4):
      # Microsoft-hosted `ubuntu-latest` agents do NOT expose /dev/kvm
      # (same gap as GitLab.com) — the android jobs below and the android
      # leg of mobilewright need a SELF-HOSTED agent pool with nested
      # virtualization enabled. `self-hosted-android-kvm` below is a
      # placeholder pool name; no such pool is provisioned for this repo.
      # Docker itself is preinstalled and fine on ubuntu-latest for
      # everything else (zap, mobsf, the emulator's own `docker run`).
      # Azure DOES provide Microsoft-hosted `macOS-latest` pools
      # comparable to GHA's — the ios job (and mobilewright's ios leg)
      # use `pool: { vmImage: 'macOS-latest' }` directly below, no
      # self-hosted requirement. This is the one leg that is NOT a gap
      # versus GHA.
      #
      # Job: Android (profile `android`) — split reads/writes. `_writes`
      # is the sixth link in the writes chain and also depends on the
      # resolver for the OmniPizza APK download.
      # -----------------------------------------------------------------
      - job: e2e_android_reads
        displayName: 'E2E — Appium Android reads'
        dependsOn: resolve_omnipizza_release
        condition: "and(or(eq('${{ parameters.platform }}', 'all'), eq('${{ parameters.platform }}', 'mobile'), eq('${{ parameters.platform }}', 'android'), eq('${{ parameters.platform }}', 'appium'), eq('${{ parameters.platform }}', 'appium-android')), in(dependencies.resolve_omnipizza_release.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))"
        pool:
          name: 'self-hosted-android-kvm'  # placeholder — nested-virt self-hosted pool, see caveat above
        variables:
          OMNIPIZZA_RELEASE_TAG: $[ dependencies.resolve_omnipizza_release.outputs['fetch.tag'] ]
          OMNIPIZZA_RELEASE_BASE_URL: $[ dependencies.resolve_omnipizza_release.outputs['fetch.base_url'] ]
        steps:
          - checkout: self
          - script: |
              echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
                | sudo tee /etc/udev/rules.d/99-kvm4all.rules
              sudo udevadm control --reload-rules
              sudo udevadm trigger --name-match=kvm
            displayName: 'Enable KVM'
          - task: NodeTool@0
            displayName: 'Set up Node'
            inputs: { versionSpec: '22.x' }
          - script: corepack enable && corepack prepare pnpm@latest --activate
            displayName: 'Enable pnpm (corepack)'
          - script: bash ci/steps/setup-environment.sh
            displayName: 'Install dependencies (setup-environment.sh)'
          - script: |
              sudo apt-get update
              sudo apt-get install -y android-sdk-platform-tools
              adb version
            displayName: 'Install Android platform tools'
          - script: |
              mkdir -p assets/apps/android
              echo "Downloading OmniPizza Android APK from release $OMNIPIZZA_RELEASE_TAG"
              curl -fL "$OMNIPIZZA_RELEASE_BASE_URL/omnipizza-release.apk" \
                -o assets/apps/android/app-release.apk
              ls -lh assets/apps/android/app-release.apk
            displayName: 'Download Android app artifact'
          - script: |
              docker run -d \
                --name android-emulator \
                --privileged \
                --device /dev/kvm \
                -p 5554:5554 \
                -p 5555:5555 \
                -e API_LEVEL=${{ parameters.androidApiLevel }} \
                -e IMG_TYPE=google_apis \
                -e ARCHITECTURE=x86_64 \
                -e DEVICE_ID=pixel \
                -e MEMORY=4096 \
                -e CORES=2 \
                -e DISABLE_ANIMATION=true \
                -e DISABLE_HIDDEN_POLICY=true \
                -e SKIP_AUTH=1 \
                halimqarroum/docker-android:api-${{ parameters.androidApiLevel }}
            displayName: 'Start Android emulator (docker-android)'
          - script: |
              pnpm exec appium --relaxed-security &
              sleep 5
            displayName: 'Start Appium server'
          - script: |
              echo "Waiting for ADB device to appear..."
              adb connect localhost:5555
              for i in $(seq 1 40); do
                if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
                  echo "Emulator ready after $((i * 15))s"
                  break
                fi
                echo "  Attempt $i/40 — waiting 15s..."
                sleep 15
              done
              adb devices
            displayName: 'Wait for emulator to be ready'
          - script: bash ci/steps/start-stack.sh android
            displayName: 'Start proxy + Appium plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: android
              DRIVER: appium
              APPIUM_HOST: localhost
              APPIUM_PORT: '4723'
              CAP_PROFILE: docker_android
              ANDROID_APP_PATH: assets/apps/android/app-release.apk
              ANDROID_UDID: localhost:5555
              PLUGIN_APPIUM: 'true'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@android and not @writes-shared-state" android reads
            displayName: 'Run E2E tests'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: android
              DRIVER: appium
              APPIUM_HOST: localhost
              APPIUM_PORT: '4723'
              CAP_PROFILE: docker_android
              ANDROID_APP_PATH: assets/apps/android/app-release.apk
              ANDROID_UDID: localhost:5555
          - script: |
              docker ps -a --filter name=android-emulator
              if docker ps -a --format '{{.Names}}' | grep -qx android-emulator; then
                docker logs --tail 200 android-emulator
              else
                echo "android-emulator container was not created."
              fi
            displayName: 'Show Android emulator logs'
            condition: failed()
          - script: bash ci/steps/collect-artifacts.sh android
            displayName: 'Collect artifacts'
            condition: always()
          - task: PublishPipelineArtifact@1
            displayName: 'Upload artifacts'
            condition: always()
            continueOnError: true
            inputs:
              targetPath: artifacts/android
              artifact: ahm-artifacts-e2e-android-reads
          - script: docker rm -f android-emulator || true
            displayName: 'Stop emulator'
            condition: always()
          - script: bash ci/steps/teardown.sh
            displayName: 'Teardown'
            condition: always()

