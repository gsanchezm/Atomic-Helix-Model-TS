          - script: bash ci/steps/start-stack.sh zap
            displayName: 'Start proxy + API + ZAP plugin'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_ZAP: 'true'
              PLUGIN_API: 'true'
          - script: bash ci/steps/run-suite.sh "@security" zap security
            displayName: 'Run security suite (API gate)'
            env:
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_ZAP: 'true'
          - script: bash ci/steps/run-suite.sh "@security-infra" zap security-infra
            displayName: 'Run security-infra suite (ZAP baseline + TLS; MobSF self-skips)'
            condition: succeededOrFailed()
            env:
              BASE_URL: $(BASE_URL)
              API_BASE_URL: $(API_BASE_URL)
              PLATFORM: api
              DRIVER: api
              PLUGIN_ZAP: 'true'
